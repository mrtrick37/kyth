---
# Kyth Calamares installer — scripted front-end configuration.
#
# Calamares is a UI front-end only.  ALL disk operations are done by bootc.
#
# Exec sequence:
#   kyth-bootcinstall→ unmounts/wipes the target disk, then runs
#                      `podman run ... bootc install to-disk` from within the
#                      clean OCI image (no live-session contamination).
#                      Mounts the installed root, finds the ostree deployment,
#                      bind-mounts proc/sys/dev/var, sets rootMountPoint.
#   locale           → writes /etc/locale.conf and /etc/localtime (timezone)
#                      into the deployment chroot via rootMountPoint
#   users            → standard CreateUserJob + SetPasswordJob + SetHostnameJob
#                      chroot into the deployment via rootMountPoint
#   kyth-umount      → recursive umount of kyth_outer_mount; cleans up all
#                      bind mounts and the root-partition mount in one pass
#
# Note: 'partition' appears only in show (disk selection UI) — bootc handles
# the actual partitioning, so it is not in the exec sequence.

modules-search: [ local ]

instances: []

sequence:
    - show:
        - welcome
        - partition
        - locale
        - users
        - summary
    - exec:
        - kyth-bootcinstall
        - locale
        - users
        - kyth-umount
    - show:
        - finished

branding: kyth

prompt-install: false

dont-chroot: false

oem-setup: false

disable-cancel: false

disable-cancel-during-exec: true

quit-at-end: false
