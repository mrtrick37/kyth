---
# Kyth Calamares installer — scripted front-end configuration.
#
# Calamares is a UI front-end only.  ALL disk operations are done by bootc.
#
# Exec sequence:
#   partition        → populates globalStorage (bootLoaderInstallPath,
#                      rootMountPoint); intermediate disk format is overwritten
#                      immediately by bootc
#   kyth-bootcinstall→ unmounts partition mounts, runs `bootc install to-disk`,
#                      finds the ostree deployment, bind-mounts proc/sys/dev/var
#                      into it, then sets rootMountPoint → deployment dir and
#                      stores the outer mount in kyth_outer_mount
#   users            → standard CreateUserJob + SetPasswordJob + SetHostnameJob
#                      chroot into the deployment via rootMountPoint
#   kyth-umount      → recursive umount of kyth_outer_mount; cleans up all
#                      bind mounts and the root-partition mount in one pass

modules-search: [ local ]

instances: []

sequence:
    - show:
        - welcome
        - partition
        - users
        - summary
    - exec:
        - partition
        - kyth-bootcinstall
        - users
        - kyth-umount
    - show:
        - finished

branding: kyth

prompt-install: false

dont-chroot: false

oem-setup: false

disable-cancel: false

disable-cancel-during-exec: true

quit-at-end: false
