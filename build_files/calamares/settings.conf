---
# Forge Calamares installer configuration.
# Sequence: welcome → (exec) bootc install → finished
# Disk selection happens before Calamares via forge-install-launcher.

modules-search: [local, /usr/lib/calamares/modules]

sequence:
  - show:
      - welcome
  - exec:
      - shellprocess@forge-install
      - finished

branding: forge

# Show "Really install?" prompt before exec phase
prompt-install: false

# Don't cancel during exec (could leave disk in bad state)
disable-cancel-during-exec: true

# We are NOT doing a chroot-based install
dont-chroot: true
