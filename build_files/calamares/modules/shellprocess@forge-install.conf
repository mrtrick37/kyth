---
# Runs the Forge bootc installation.
#
# @@bootLoaderInstallPath@@ — set by the partition module's FillGlobalStorageJob;
#   for EFI this is the ESP (e.g. /dev/sda1); forge-calamares-install strips the
#   partition suffix to obtain the whole disk (/dev/sda).
# @@timezone@@ — set by the locale show step (e.g. "America/New_York").

dontChroot: true
timeout: 7200

script:
    - "/usr/bin/forge-calamares-install @@bootLoaderInstallPath@@ @@timezone@@"
