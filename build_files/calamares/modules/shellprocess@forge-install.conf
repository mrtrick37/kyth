---
# Runs the Forge bootc installation.
# The target disk is read from /tmp/forge-target-disk,
# written there by forge-install-launcher before Calamares starts.

dontChroot: true
timeout: 7200

script:
    # Run via sudo — Calamares itself runs as liveuser; bootc install needs root.
    - "sudo /usr/bin/forge-calamares-install"
