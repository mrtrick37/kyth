---
# Forge welcome / requirements check page

showSupportUrl:      false
showKnownIssuesUrl:  false
showReleaseNotesUrl: false

requirements:
    # Minimum disk size (GB) — bootc needs headroom for the OS
    requiredStorage: 20.0
    # Minimum RAM (GB) for live session + download buffer
    requiredRam: 2.0
    # Internet is required — bootc pulls the image from ghcr.io
    checkInternet: true
    checkPower:    false
    internetCheckUrl: "https://ghcr.io"
