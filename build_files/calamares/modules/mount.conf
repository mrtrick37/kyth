---
# Forge mount module configuration.
#
# The mount module mounts the partitions created by the partition module
# under /tmp/calamares-root.  forge-calamares-install.sh reads which disk
# is mounted there, unmounts it, then runs 'bootc install to-disk'.
#
# We do NOT need /dev, /proc, /sys bind mounts because we are not running
# any commands inside a chroot — bootc handles the entire install itself.

extraMounts: []
