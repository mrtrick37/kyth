<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="KythOS wallpaper">
  <defs>
    <linearGradient id="petal-cool" x1="760" y1="438" x2="900" y2="590" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7dcfff"/>
      <stop offset="48%" stop-color="#73daca"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
    <linearGradient id="petal-warm" x1="900" y1="440" x2="764" y2="594" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff9e64"/>
      <stop offset="48%" stop-color="#e0af68"/>
      <stop offset="100%" stop-color="#f7768e"/>
    </linearGradient>
    <radialGradient id="core-fill" cx="50%" cy="45%" r="64%">
      <stop offset="0%" stop-color="#fff1b8"/>
      <stop offset="42%" stop-color="#e0af68"/>
      <stop offset="100%" stop-color="#f7768e"/>
    </radialGradient>
    <filter id="soft-glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="word-glow" x="-40%" y="-120%" width="180%" height="340%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#000000"/>

  <g transform="translate(724 418)" filter="url(#soft-glow)">
    <g opacity="0.9">
      <path d="M100 18 C126 44 126 72 100 95 C74 72 74 44 100 18Z" fill="url(#petal-cool)" opacity="0.78"/>
      <path d="M182 100 C156 126 128 126 105 100 C128 74 156 74 182 100Z" fill="url(#petal-warm)" opacity="0.78"/>
      <path d="M100 182 C74 156 74 128 100 105 C126 128 126 156 100 182Z" fill="url(#petal-cool)" opacity="0.72"/>
      <path d="M18 100 C44 74 72 74 95 100 C72 126 44 126 18 100Z" fill="url(#petal-warm)" opacity="0.72"/>

      <path d="M42 42 C79 45 99 65 98 98 C65 99 45 79 42 42Z" fill="#bb9af7" opacity="0.62"/>
      <path d="M158 42 C155 79 135 99 102 98 C101 65 121 45 158 42Z" fill="#73daca" opacity="0.62"/>
      <path d="M158 158 C121 155 101 135 102 102 C135 101 155 121 158 158Z" fill="#7dcfff" opacity="0.58"/>
      <path d="M42 158 C45 121 65 101 98 102 C99 135 79 155 42 158Z" fill="#f7768e" opacity="0.58"/>
    </g>

    <path d="M59 101 C74 70 126 70 141 101 C126 130 74 130 59 101Z" fill="#0d1117" opacity="0.34"/>
    <circle cx="100" cy="100" r="28" fill="url(#core-fill)"/>
    <circle cx="100" cy="100" r="10" fill="#0d1117" opacity="0.56"/>

    <circle cx="100" cy="28" r="5" fill="#fff1b8" opacity="0.88"/>
    <circle cx="172" cy="100" r="5" fill="#73daca" opacity="0.88"/>
    <circle cx="100" cy="172" r="5" fill="#bb9af7" opacity="0.88"/>
    <circle cx="28" cy="100" r="5" fill="#ff9e64" opacity="0.88"/>
  </g>

  <text x="1062" y="543"
        font-family="'DejaVu Sans', 'Liberation Sans', sans-serif"
        font-size="58"
        font-weight="400"
        fill="#f4d6b1"
        text-anchor="middle"
        filter="url(#word-glow)">KythOS</text>
</svg>
