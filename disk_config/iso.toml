# Anaconda installer ISO config — default (no desktop)
# Used by: just build-iso (via bootc-image-builder)
#
# BIB automatically injects the ostreecontainer source from the target image.
# This kickstart handles pre-boot network setup and post-install registry config.

[customizations.installer.kickstart]
contents = """
%pre
# Disable brltty — causes spurious Bluetooth warnings in the installer log.
systemctl stop brltty.service brltty.socket 2>/dev/null || true
systemctl mask brltty.service brltty.socket 2>/dev/null || true

# Bring up wired network via DHCP so the installer can reach the registry.
if command -v nmcli >/dev/null 2>&1; then
  for dev in $(nmcli -t -f DEVICE,TYPE,STATE device | awk -F: '$2=="ethernet" && $3!="connected" {print $1}'); do
    nmcli device connect "$dev" >/dev/null 2>&1 || true
  done
fi
%end

%post
# Point the installed system at the registry for future bootc updates.
bootc switch --mutate-in-place --transport registry ghcr.io/mrtrick37/kyth:latest
hostnamectl set-hostname kyth
%end
"""

[customizations.installer.modules]
enable = [
  "org.fedoraproject.Anaconda.Modules.Storage",
  "org.fedoraproject.Anaconda.Modules.Runtime",
  "org.fedoraproject.Anaconda.Modules.Network",
  "org.fedoraproject.Anaconda.Modules.Security",
  "org.fedoraproject.Anaconda.Modules.Services",
  "org.fedoraproject.Anaconda.Modules.Users",
  "org.fedoraproject.Anaconda.Modules.Timezone"
]

disable = [
  "org.fedoraproject.Anaconda.Modules.Subscription",
]

[[customizations.files]]
path = "/boot/grub2/grub.cfg"
source = "iso_overlay/boot/grub2/grub.cfg"
mode = "0644"

[[customizations.files]]
path = "/isolinux/isolinux.cfg"
source = "iso_overlay/isolinux/isolinux.cfg"
mode = "0644"

[[customizations.files]]
path = "/EFI/BOOT/grub.cfg"
source = "iso_overlay/EFI/BOOT/grub.cfg"
mode = "0644"

[[customizations.files]]
path = "/etc/os-release"
source = "iso_overlay/etc/os-release"
mode = "0644"
