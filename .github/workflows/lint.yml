name: Lint

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - testing
    paths:
      - '**/*.sh'
      - '.github/workflows/lint.yml'
  pull_request:
    branches:
      - main
      - testing
    paths:
      - '**/*.sh'
      - '.github/workflows/lint.yml'
  schedule:
    - cron: '30 10 * * 1'  # Weekly on Monday — push/PR already handles incremental checks
  workflow_dispatch:

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # Full history so the push/PR base commit exists locally — with the
          # default shallow clone, git diff fails with "bad object" and the
          # changed-file detection silently skips every shellcheck run.
          fetch-depth: 0

      - name: Compute changed shell files
        id: changed
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        run: |
          set -o pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          # New branches / force pushes can reference a base we don't have
          # (or the all-zeros SHA) — fall back to scanning every script.
          if git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            # --diff-filter=d: deleted scripts can't be shellchecked.
            FILES=$(git diff --name-only --diff-filter=d "${BASE}" "${HEAD}" -- '*.sh' | tr '\n' ' ')
          else
            echo "Base ${BASE} unavailable; falling back to full scan"
            FILES=$(git ls-files '*.sh' | tr '\n' ' ')
          fi
          echo "files=${FILES}" >> "$GITHUB_OUTPUT"

      - name: Run shellcheck (changed files)
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        run: |
          if [[ -z "${{ steps.changed.outputs.files }}" ]]; then
            echo "No changed shell files; skipping shellcheck"
            exit 0
          fi
          # shellcheck disable=SC2086
          shellcheck ${{ steps.changed.outputs.files }}

      - name: Run shellcheck (full scan)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          find . -iname "*.sh" -type f -print0 \
            | xargs -0 shellcheck
