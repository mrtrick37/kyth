name: Lint

on:
  push:
    branches:
      - main
      - testing
    paths:
      - '**/*.sh'
      - '.github/workflows/lint.yml'
  pull_request:
    branches:
      - main
      - testing
    paths:
      - '**/*.sh'
      - '.github/workflows/lint.yml'

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run shellcheck
        run: |
          find . -iname "*.sh" -type f -print0 \
            | xargs -0 shellcheck
