name: Build Live ISO
run-name: "Build Live ISO - ${{ inputs.source_tag }}"

on:
  workflow_call:
    inputs:
      source_tag:
        description: Source image tag to build ISO from
        required: false
        type: string
        # Fedora variant only — the live ISO must boot the signed Fedora kernel
        # for Secure Boot. The -cachy image has no Fedora kernel and would fail.
        default: testing
      source_digest:
        description: Optional pinned source image digest
        required: false
        type: string
        default: ""
      source_sha:
        description: Source commit matching source_digest
        required: false
        type: string
        default: ""
    secrets:
      R2_ACCESS_KEY_ID:
        required: true
      R2_SECRET_ACCESS_KEY:
        required: true
      R2_ACCOUNT_ID:
        required: true
  workflow_dispatch:
    inputs:
      source_tag:
        description: Source image tag to build ISO from
        required: false
        default: latest
        type: choice
        # Fedora variants only — the live ISO must boot the signed Fedora kernel
        # for Secure Boot. The -cachy images have no Fedora kernel and the ISO
        # build will hard-fail on them by design.
        options:
          - latest
          - testing
      source_digest:
        description: Immutable source image digest from the build workflow
        required: false
        type: string
      source_sha:
        description: Source commit matching source_digest
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: build-live-iso-${{ inputs.source_tag }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ISO (${{ inputs.source_tag }})
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    permissions:
      contents: read
      packages: read
    outputs:
      artifact_name: ${{ steps.release.outputs.artifact_name }}
      source_sha: ${{ steps.release.outputs.source_sha }}
      release_id: ${{ steps.release.outputs.release_id }}
      iso_basename: ${{ steps.release.outputs.iso_basename }}
      channel_basename: ${{ steps.release.outputs.channel_basename }}
      immutable_tag: ${{ steps.release.outputs.immutable_tag }}
      source_image: ${{ steps.source_image.outputs.name }}
      source_digest: ${{ steps.source_image.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha || (startsWith(inputs.source_tag, 'testing') && 'testing' || 'main') }}
          persist-credentials: false

      - name: Prepare immutable release identity
        id: release
        env:
          SOURCE_TAG: ${{ inputs.source_tag }}
        run: |
          exec 3>>"${GITHUB_OUTPUT}"
          SOURCE_SHA="$(git rev-parse HEAD)"
          SHORT_SHA="$(git rev-parse --short=8 HEAD)"
          DATE="$(date -u +%Y%m%d)"
          RELEASE_ID="${DATE}-${SHORT_SHA}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          ISO_BASENAME="kyth-live-${SOURCE_TAG}-${RELEASE_ID}.iso"
          CHANNEL_BASENAME="kyth-live-${SOURCE_TAG}.iso"
          IMMUTABLE_TAG="iso-${SOURCE_TAG}-${RELEASE_ID}"
          ARTIFACT_NAME="kyth-live-iso-${SOURCE_TAG}-${RELEASE_ID}"

          echo "source_sha=${SOURCE_SHA}" >&3
          echo "release_id=${RELEASE_ID}" >&3
          echo "iso_basename=${ISO_BASENAME}" >&3
          echo "channel_basename=${CHANNEL_BASENAME}" >&3
          echo "immutable_tag=${IMMUTABLE_TAG}" >&3
          echo "artifact_name=${ARTIFACT_NAME}" >&3

      - name: Prepare live ISO build space
        run: |
          set -euo pipefail

          show_space() {
            echo "==> Disk space: $1"
            df -h / /mnt /var/lib/containers 2>/dev/null || true
          }

          show_space "before cleanup"

          # The live ISO job uses rootful Podman writing to a btrfs image on /mnt,
          # not Docker. Prune the large hosted-runner directories that eat root-disk
          # space, but skip docker image prune — Docker images live on the root disk
          # and don't affect /mnt free space, so pruning them buys nothing here
          # and costs ~45 seconds.
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup || true
          sudo swapoff -a || true
          sudo rm -f /mnt/swapfile || true

          show_space "after cleanup"

          available_kb="$(df --output=avail /mnt | awk 'NR == 2 {print $1}')"
          # podman-storage.img is intentionally sparse: the btrfs filesystem
          # needs a 65G logical size, but the runner only needs enough backing
          # space for the blocks the ISO build actually writes. GitHub's
          # ubuntu-24.04 runners can now expose about 63 GiB free on /mnt after
          # cleanup, so requiring the full logical size rejects otherwise usable
          # runners before the build starts.
          required_kb=$((58 * 1024 * 1024))
          if (( available_kb < required_kb )); then
            echo "::error::Need at least 58 GiB free on /mnt for the live ISO build; found $((available_kb / 1024 / 1024)) GiB."
            exit 1
          fi

      - name: Mount compressed Podman storage
        run: |
          sudo truncate -s 65G /mnt/podman-storage.img
          sudo mkfs.btrfs -f /mnt/podman-storage.img
          sudo podman system reset --force
          sudo systemctl stop podman.service
          sudo mount -o compress-force=zstd:2 /mnt/podman-storage.img /var/lib/containers/storage
          sudo systemctl start podman.service

      - name: Resolve source image digest
        id: source_image
        env:
          SOURCE_TAG: ${{ inputs.source_tag }}
          EXPECTED_DIGEST: ${{ inputs.source_digest }}
        run: |
          exec 3>>"${GITHUB_OUTPUT}"
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          TAGGED_IMAGE="${IMAGE}:${SOURCE_TAG}"
          if [[ -n "${EXPECTED_DIGEST}" ]]; then
            [[ "${EXPECTED_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]
            DIGEST="${EXPECTED_DIGEST}"
            # Confirm the immutable manifest exists and belongs to this repository.
            sudo skopeo inspect "docker://${IMAGE}@${DIGEST}" >/dev/null
          else
            echo "::warning::No source_digest supplied; resolving the moving ${SOURCE_TAG} tag for this manual build."
            DIGEST="$(sudo skopeo inspect --format '{{.Digest}}' "docker://${TAGGED_IMAGE}")"
          fi
          REVISION="$(sudo skopeo inspect "docker://${IMAGE}@${DIGEST}" | jq -r '.Labels["org.opencontainers.image.revision"] // empty')"
          EXPECTED_REVISION="$(git rev-parse HEAD)"
          if [[ "${REVISION}" != "${EXPECTED_REVISION}" ]]; then
            echo "::error::Source image ${IMAGE}@${DIGEST} was built from revision '${REVISION:-<missing>}', but this ISO workflow checked out '${EXPECTED_REVISION}'. Re-run the image build for this commit, then pass its digest as source_digest."
            exit 1
          fi
          echo "name=${IMAGE}" >&3
          echo "digest=${DIGEST}" >&3
          echo "pinned=${IMAGE}@${DIGEST}" >&3

      - name: Build live payload container
        env:
          SOURCE_TAG: ${{ inputs.source_tag }}
          SOURCE_IMAGE_PINNED: ${{ steps.source_image.outputs.pinned }}
        run: |
          sudo podman build \
            --cap-add SYS_ADMIN \
            --security-opt label=disable \
            --build-arg "BASE_IMAGE=${SOURCE_IMAGE_PINNED}" \
            --build-arg "SOURCE_TAG=${SOURCE_TAG}" \
            --tag localhost/payload:latest \
            -f installer/Containerfile \
            .

      - name: Prepare ISO output directory
        run: mkdir -p output/live-iso

      - name: Build ISO with Titanoboa
        # This third-party action is pinned, but still runs only in the
        # credential-free build job because it performs privileged operations.
        uses: Zeglius/titanoboa@7737f4748458252ac827dca14b3d6dd09298472a
        with:
          image-ref: localhost/payload:latest
          iso-dest: ${{ runner.temp }}/kyth-live-${{ inputs.source_tag }}.iso

      - name: Move and verify ISO
        run: |
          ISO="output/live-iso/${STEPS_RELEASE_OUTPUTS_ISO_BASENAME}"
          mv "${RUNNER_TEMP}/kyth-live-${SOURCE_TAG}.iso" "${ISO}"
          sudo chown "$(id -u):$(id -g)" "${ISO}"
          test -s "${ISO}"
          test -r "${ISO}"
          test -w "${ISO}"
          echo "==> Built $(du -h "${ISO}" | cut -f1) ISO: ${ISO}"
        env:
          RUNNER_TEMP: ${{ runner.temp }}
          SOURCE_TAG: ${{ inputs.source_tag }}
          STEPS_RELEASE_OUTPUTS_ISO_BASENAME: ${{ steps.release.outputs.iso_basename }}

      - name: Generate ISO checksums
        run: |
          ISO="output/live-iso/${STEPS_RELEASE_OUTPUTS_ISO_BASENAME}"
          CHANNEL_CHECKSUM="output/live-iso/${STEPS_RELEASE_OUTPUTS_CHANNEL_BASENAME}-CHECKSUM"
          (cd "$(dirname "${ISO}")" && sha256sum "$(basename "${ISO}")" > "$(basename "${ISO}")-CHECKSUM")
          SHA256="$(sha256sum "${ISO}" | awk '{print $1}')"
          printf '%s  %s\n' "${SHA256}" "${STEPS_RELEASE_OUTPUTS_CHANNEL_BASENAME}" \
            > "${CHANNEL_CHECKSUM}"
        env:
          STEPS_RELEASE_OUTPUTS_ISO_BASENAME: ${{ steps.release.outputs.iso_basename }}
          STEPS_RELEASE_OUTPUTS_CHANNEL_BASENAME: ${{ steps.release.outputs.channel_basename }}

      - name: Upload unsigned ISO artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.release.outputs.artifact_name }}
          path: output/live-iso/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish ISO (${{ inputs.source_tag }})
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    environment: ${{ inputs.source_tag == 'testing' && 'testing-release' || 'stable-release' }}
    permissions:
      actions: read
      contents: write
      id-token: write
      attestations: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.build.outputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install ORAS
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0
        with:
          version: 1.3.1

      - name: Login to GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${GH_TOKEN}" | oras login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Setup Grype
        id: setup_grype
        env:
          GRYPE_VERSION: 0.88.0
        run: |
          exec 3>>"${GITHUB_OUTPUT}"
          ARCHIVE="grype_${GRYPE_VERSION}_linux_amd64.tar.gz"
          BASE="https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}"
          curl --fail --location --silent --show-error \
            --output "${RUNNER_TEMP}/${ARCHIVE}" "${BASE}/${ARCHIVE}"
          curl --fail --location --silent --show-error \
            --output "${RUNNER_TEMP}/grype_checksums.txt" \
            "${BASE}/grype_${GRYPE_VERSION}_checksums.txt"
          (cd "${RUNNER_TEMP}" && grep " ${ARCHIVE}$" grype_checksums.txt | sha256sum --check --strict -)
          tar --extract --gzip --file "${RUNNER_TEMP}/${ARCHIVE}" --directory "${RUNNER_TEMP}" grype
          chmod +x "${RUNNER_TEMP}/grype"
          echo "cmd=${RUNNER_TEMP}/grype" >&3

      - name: Pull source image SBOM
        id: current_sbom
        env:
          SOURCE_IMAGE: ${{ needs.build.outputs.source_image }}
          SOURCE_DIGEST: ${{ needs.build.outputs.source_digest }}
        run: |
          exec 3>>"${GITHUB_OUTPUT}"
          SBOM_DIGEST="$(oras discover --format json "${SOURCE_IMAGE}@${SOURCE_DIGEST}" \
            | jq -r '[.referrers[] | select(.artifactType | contains("syft"))] | .[0].digest // empty' \
            2>/dev/null || true)"
          if [[ -z "${SBOM_DIGEST}" ]]; then
            echo "::warning::No SBOM attached to source image; CVE section will be skipped"
            exit 0
          fi
          mkdir -p "${RUNNER_TEMP}/current-sbom"
          oras pull "${SOURCE_IMAGE}@${SBOM_DIGEST}" -o "${RUNNER_TEMP}/current-sbom/"
          SBOM="$(find "${RUNNER_TEMP}/current-sbom" -name '*.json' -type f | head -1)"
          [[ -n "${SBOM}" ]] && echo "path=${SBOM}" >&3

      - name: Scan source image with Grype
        id: grype_current
        if: steps.current_sbom.outputs.path != ''
        env:
          GRYPE_CMD: ${{ steps.setup_grype.outputs.cmd }}
          SBOM_PATH: ${{ steps.current_sbom.outputs.path }}
        run: |
          exec 3>>"${GITHUB_OUTPUT}"
          OUT="${RUNNER_TEMP}/grype-current.json"
          "${GRYPE_CMD}" "sbom:${SBOM_PATH}" -o json --file "${OUT}" || \
            echo "::warning::Grype scan failed; security section will be limited"
          [[ -f "${OUT}" ]] && echo "path=${OUT}" >&3

      - name: Pull previous ISO source image SBOM
        id: previous_sbom
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          SOURCE_IMAGE: ${{ needs.build.outputs.source_image }}
          SOURCE_TAG: ${{ inputs.source_tag }}
          IMMUTABLE_TAG: ${{ needs.build.outputs.immutable_tag }}
        run: |
          exec 3>>"${GITHUB_OUTPUT}"
          PREV_DIGEST=""
          PREV_TAG="$(gh release list --limit 30 --json tagName \
            -q ".[] | .tagName | select(startswith(\"iso-${SOURCE_TAG}-\"))" \
            | grep -v "^${IMMUTABLE_TAG}$" | head -1 || true)"
          if [[ -n "${PREV_TAG}" ]]; then
            RELEASE_BODY="$(gh release view "${PREV_TAG}" --json body -q '.body' 2>/dev/null || true)"
            PREV_DIGEST="$(python3 -c "
          import re, sys
          body = sys.stdin.read()
          m = re.search(r'Source image digest: \*\*([^*]+)\*\*', body)
          print(m.group(1) if m else '', end='')
          " <<< "${RELEASE_BODY}" || true)"
          fi
          if [[ -z "${PREV_DIGEST}" || ! "${PREV_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "No previous source digest found; CVE diff will be skipped"
            exit 0
          fi
          PREV_SBOM_DIGEST="$(oras discover --format json "${SOURCE_IMAGE}@${PREV_DIGEST}" \
            | jq -r '[.referrers[] | select(.artifactType | contains("syft"))] | .[0].digest // empty' \
            2>/dev/null || true)"
          if [[ -z "${PREV_SBOM_DIGEST}" ]]; then
            echo "No previous SBOM found; CVE diff will be skipped"
            exit 0
          fi
          mkdir -p "${RUNNER_TEMP}/prev-sbom"
          oras pull "${SOURCE_IMAGE}@${PREV_SBOM_DIGEST}" -o "${RUNNER_TEMP}/prev-sbom/"
          PREV_SBOM="$(find "${RUNNER_TEMP}/prev-sbom" -name '*.json' -type f | head -1)"
          [[ -n "${PREV_SBOM}" ]] && echo "path=${PREV_SBOM}" >&3

      - name: Scan previous source image with Grype
        id: grype_previous
        if: steps.previous_sbom.outputs.path != ''
        env:
          GRYPE_CMD: ${{ steps.setup_grype.outputs.cmd }}
          PREV_SBOM: ${{ steps.previous_sbom.outputs.path }}
        run: |
          exec 3>>"${GITHUB_OUTPUT}"
          OUT="${RUNNER_TEMP}/grype-previous.json"
          "${GRYPE_CMD}" "sbom:${PREV_SBOM}" -o json --file "${OUT}" || \
            echo "::warning::Grype scan of previous SBOM failed"
          [[ -f "${OUT}" ]] && echo "path=${OUT}" >&3

      - name: Generate ISO release changelog
        id: iso_changelog
        env:
          GH_REPO: ${{ github.repository }}
          SOURCE_TAG: ${{ inputs.source_tag }}
          SOURCE_SHA: ${{ needs.build.outputs.source_sha }}
          SOURCE_IMAGE: ${{ needs.build.outputs.source_image }}
          SOURCE_DIGEST: ${{ needs.build.outputs.source_digest }}
          GRYPE_CURRENT: ${{ steps.grype_current.outputs.path }}
          GRYPE_PREVIOUS: ${{ steps.grype_previous.outputs.path }}
        run: |
          exec 3>>"${GITHUB_OUTPUT}"
          NOTES="$(mktemp --suffix=.md)"
          IMAGE_VERSION="$(skopeo inspect --no-creds \
            "docker://${SOURCE_IMAGE}@${SOURCE_DIGEST}" 2>/dev/null \
            | jq -r '.Labels["org.opencontainers.image.version"] // empty' || true)"
          export IMAGE_VERSION NOTES
          python3 - <<'PY'
          import json, os, sys
          from pathlib import Path
          sys.path.insert(0, '.github/scripts')
          from kyth_changelog import security_section

          repo = os.environ.get("GH_REPO", "")
          tag = os.environ.get("SOURCE_TAG", "")
          source_sha = os.environ.get("SOURCE_SHA", "")
          source_image = os.environ.get("SOURCE_IMAGE", "")
          source_digest = os.environ.get("SOURCE_DIGEST", "")
          image_version = os.environ.get("IMAGE_VERSION", "")
          grype_current = os.environ.get("GRYPE_CURRENT") or None
          grype_previous = os.environ.get("GRYPE_PREVIOUS") or None
          notes_path = os.environ["NOTES"]

          lines = [
              "### What this ISO installs",
              "",
              f"Bootable installer for KythOS from the **{tag}** channel. "
              "Boot from USB and click **Install KythOS** to set up your system.",
              "",
              f"- Source image: `{source_image}@{source_digest}`",
              f"- Source commit: `{source_sha}`",
              "",
          ]

          sec = security_section(grype_current, grype_previous)
          if sec:
              lines.append(sec.rstrip())
              lines.append("")

          if image_version:
              release_tag = "image-" + image_version.replace(".", "-")
              image_url = f"https://github.com/{repo}/releases/tag/{release_tag}"
              lines += [f"Full package changelog: [{release_tag}]({image_url})", ""]
          else:
              lines += [
                  f"Full package changelog: [image releases]"
                  f"(https://github.com/{repo}/releases?q=image-{tag})",
                  "",
              ]

          Path(notes_path).write_text("\n".join(lines).rstrip() + "\n", encoding="utf-8")
          PY
          echo "path=${NOTES}" >&3

      - name: Download built ISO
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: output/live-iso

      - name: Verify transferred artifact
        run: |
          ISO="output/live-iso/${NEEDS_BUILD_OUTPUTS_ISO_BASENAME}"
          test -s "${ISO}"
          (cd output/live-iso && sha256sum --check --strict "${NEEDS_BUILD_OUTPUTS_ISO_BASENAME}-CHECKSUM")
        env:
          NEEDS_BUILD_OUTPUTS_ISO_BASENAME: ${{ needs.build.outputs.iso_basename }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.6.1

      - name: Sign ISO
        run: |
          ISO="output/live-iso/${NEEDS_BUILD_OUTPUTS_ISO_BASENAME}"
          cosign sign-blob -y "${ISO}" \
            --output-signature "${ISO}.sig" \
            --bundle "${ISO}.bundle"
        env:
          NEEDS_BUILD_OUTPUTS_ISO_BASENAME: ${{ needs.build.outputs.iso_basename }}

      - name: Attest ISO build provenance
        id: attest_iso
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: output/live-iso/${{ needs.build.outputs.iso_basename }}

      - name: Generate signed release metadata
        env:
          SOURCE_TAG: ${{ inputs.source_tag }}
          ATTESTATION_URL: ${{ steps.attest_iso.outputs.attestation-url }}
          ATTESTATION_BUNDLE_PATH: ${{ steps.attest_iso.outputs.bundle-path }}
          ISO_BASENAME: ${{ needs.build.outputs.iso_basename }}
          CHANNEL_BASENAME: ${{ needs.build.outputs.channel_basename }}
          IMMUTABLE_TAG: ${{ needs.build.outputs.immutable_tag }}
          SOURCE_SHA: ${{ needs.build.outputs.source_sha }}
          SOURCE_IMAGE: ${{ needs.build.outputs.source_image }}
          SOURCE_DIGEST: ${{ needs.build.outputs.source_digest }}
        run: |
          ISO="output/live-iso/${ISO_BASENAME}"
          SHA256="$(sha256sum "${ISO}" | awk '{print $1}')"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export SHA256 BUILD_DATE
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          tag = os.environ["SOURCE_TAG"]
          iso = Path("output/live-iso") / os.environ["ISO_BASENAME"]
          channel = os.environ["CHANNEL_BASENAME"]
          base_url = "https://pub-9a3cc72972ea44c4ae7504ee7cda1fa6.r2.dev"
          metadata = {
              "iso": iso.name,
              "sha256": os.environ["SHA256"],
              "signature": iso.name + ".sig",
              "bundle": iso.name + ".bundle",
              "provenance": iso.name + ".intoto.jsonl",
              "checksum": iso.name + "-CHECKSUM",
              "attestation_url": os.environ["ATTESTATION_URL"],
              "source_image": os.environ["SOURCE_IMAGE"],
              "source_image_digest": os.environ["SOURCE_DIGEST"],
              "pinned_source_image": os.environ["SOURCE_IMAGE"] + "@" + os.environ["SOURCE_DIGEST"],
              "source_commit": os.environ["SOURCE_SHA"],
              "source_tag": tag,
              "build_date": os.environ["BUILD_DATE"],
              "release_tag": os.environ["IMMUTABLE_TAG"],
              "download_url": f"{base_url}/{iso.name}",
              "workflow_run": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
          }
          Path(str(iso) + ".json").write_text(json.dumps(metadata, indent=2) + "\n")

          channel_metadata = dict(metadata)
          channel_metadata.update({
              "iso": channel,
              "signature": channel + ".sig",
              "bundle": channel + ".bundle",
              "provenance": channel + ".intoto.jsonl",
              "checksum": channel + "-CHECKSUM",
              "download_url": f"{base_url}/{channel}",
              "immutable_download_url": metadata["download_url"],
          })
          Path("output/live-iso", channel + ".json").write_text(
              json.dumps(channel_metadata, indent=2) + "\n"
          )
          PY

          cp "${ISO}.sig" "output/live-iso/${CHANNEL_BASENAME}.sig"
          cp "${ISO}.bundle" "output/live-iso/${CHANNEL_BASENAME}.bundle"
          test -s "${ATTESTATION_BUNDLE_PATH}"
          cp "${ATTESTATION_BUNDLE_PATH}" "${ISO}.intoto.jsonl"
          cp "${ATTESTATION_BUNDLE_PATH}" "output/live-iso/${CHANNEL_BASENAME}.intoto.jsonl"

      - name: Upload ISO to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          NEEDS_BUILD_OUTPUTS_ISO_BASENAME: ${{ needs.build.outputs.iso_basename }}
          NEEDS_BUILD_OUTPUTS_CHANNEL_BASENAME: ${{ needs.build.outputs.channel_basename }}
        run: |
          ISO="output/live-iso/${NEEDS_BUILD_OUTPUTS_ISO_BASENAME}"
          CHANNEL="output/live-iso/${NEEDS_BUILD_OUTPUTS_CHANNEL_BASENAME}"

          for artifact in "${ISO}" "${ISO}-CHECKSUM" "${ISO}.sig" "${ISO}.bundle" "${ISO}.intoto.jsonl" "${ISO}.json"; do
            aws s3 cp "${artifact}" \
              "s3://kyth-releases/$(basename "${artifact}")" \
              --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
              --no-progress
          done

          aws s3 cp "${ISO}" "s3://kyth-releases/$(basename "${CHANNEL}")" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" --no-progress
          for suffix in -CHECKSUM .sig .bundle .intoto.jsonl .json; do
            aws s3 cp "${CHANNEL}${suffix}" \
              "s3://kyth-releases/$(basename "${CHANNEL}${suffix}")" \
              --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
              --no-progress
          done

      - name: Publish GitHub releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          SOURCE_TAG: ${{ inputs.source_tag }}
          CHANNEL_TAG: ${{ inputs.source_tag == 'testing' && 'iso-testing' || 'iso-latest' }}
          IMMUTABLE_TAG: ${{ needs.build.outputs.immutable_tag }}
          RELEASE_ID: ${{ needs.build.outputs.release_id }}
          SOURCE_SHA: ${{ needs.build.outputs.source_sha }}
          SOURCE_DIGEST: ${{ needs.build.outputs.source_digest }}
          ATTESTATION_URL: ${{ steps.attest_iso.outputs.attestation-url }}
          ISO_BASENAME: ${{ needs.build.outputs.iso_basename }}
          CHANNEL_BASENAME: ${{ needs.build.outputs.channel_basename }}
          ISO_CHANGELOG: ${{ steps.iso_changelog.outputs.path }}
        run: |
          ISO="output/live-iso/${ISO_BASENAME}"
          CHANNEL="output/live-iso/${CHANNEL_BASENAME}"
          PUBLIC_BASE="https://pub-9a3cc72972ea44c4ae7504ee7cda1fa6.r2.dev"
          IMMUTABLE_ISO_URL="${PUBLIC_BASE}/${ISO_BASENAME}"
          CHANNEL_ISO_URL="${PUBLIC_BASE}/${CHANNEL_BASENAME}"
          IMMUTABLE_RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${IMMUTABLE_TAG}"

          if [[ "${SOURCE_TAG}" == "testing" ]]; then
            CHANNEL_TITLE="Kyth Live ISO - Testing"
            IMMUTABLE_TITLE="Kyth Live ISO - Testing - ${RELEASE_ID}"
            PRERELEASE="--prerelease"
            LATEST=""
          else
            CHANNEL_TITLE="Kyth Live ISO - Stable"
            IMMUTABLE_TITLE="Kyth Live ISO - Stable - ${RELEASE_ID}"
            PRERELEASE=""
            LATEST="--latest"
          fi

          IMMUTABLE_NOTES="$(mktemp)"
          {
            echo "Permanent KythOS ISO build from **${SOURCE_TAG}**."
            echo ""
            cat "${ISO_CHANGELOG:-/dev/null}" 2>/dev/null || true
            echo "---"
            echo "**[Download immutable ISO](${IMMUTABLE_ISO_URL})** | [Checksum](${IMMUTABLE_ISO_URL}-CHECKSUM)"
            echo ""
            echo "- Source commit: **${SOURCE_SHA}**"
            echo "- Source image digest: **${SOURCE_DIGEST}**"
            echo "- Workflow run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Build provenance: ${ATTESTATION_URL}"
            echo ""
            echo "The checksum, Cosign signature and bundle, SLSA provenance, metadata, and GitHub build provenance are attached to this release."
          } > "${IMMUTABLE_NOTES}"

          gh release create "${IMMUTABLE_TAG}" \
            --target "${SOURCE_SHA}" \
            --title "${IMMUTABLE_TITLE}" \
            --notes-file "${IMMUTABLE_NOTES}" \
            ${PRERELEASE}
          gh release upload "${IMMUTABLE_TAG}" \
            "${ISO}-CHECKSUM" "${ISO}.sig" "${ISO}.bundle" "${ISO}.intoto.jsonl" "${ISO}.json"

          CHANNEL_NOTES="$(mktemp)"
          {
            echo "This is the moving **${SOURCE_TAG}** channel pointer."
            echo ""
            cat "${ISO_CHANGELOG:-/dev/null}" 2>/dev/null || true
            echo "---"
            echo "**[Download current ISO](${CHANNEL_ISO_URL})** | [Checksum](${CHANNEL_ISO_URL}-CHECKSUM)"
            echo ""
            echo "Current immutable release: [${IMMUTABLE_TAG}](${IMMUTABLE_RELEASE_URL})"
            echo ""
            echo "- Source commit: **${SOURCE_SHA}**"
            echo "- Source image digest: **${SOURCE_DIGEST}**"
            echo "- Build provenance: ${ATTESTATION_URL}"
          } > "${CHANNEL_NOTES}"

          if gh release view "${CHANNEL_TAG}" >/dev/null 2>&1; then
            gh release edit "${CHANNEL_TAG}" \
              --title "${CHANNEL_TITLE}" \
              --notes-file "${CHANNEL_NOTES}" \
              ${PRERELEASE} ${LATEST}
          else
            gh release create "${CHANNEL_TAG}" \
              --target "${SOURCE_SHA}" \
              --title "${CHANNEL_TITLE}" \
              --notes-file "${CHANNEL_NOTES}" \
              ${PRERELEASE} ${LATEST}
          fi
          gh release upload "${CHANNEL_TAG}" --clobber \
            "${CHANNEL}-CHECKSUM" "${CHANNEL}.sig" "${CHANNEL}.bundle" "${CHANNEL}.intoto.jsonl" "${CHANNEL}.json"
