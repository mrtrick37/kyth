name: Build Live ISO
run-name: "Build Live ISO — ${{ inputs.source_tag }}"

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: 'Source image tag to build ISO from'
        required: false
        default: 'latest'
        type: choice
        options:
          - latest
          - testing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-iso:
    name: Build ISO (${{ matrix.source_tag }})
    runs-on: ubuntu-24.04
    concurrency:
      group: build-live-iso-${{ matrix.source_tag }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        source_tag: ${{ fromJSON(format('["{0}"]', inputs.source_tag)) }}
    permissions:
      contents: write
      packages: read
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ matrix.source_tag == 'testing' && 'testing' || 'main' }}

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Mount compressed Podman storage
        run: |
          sudo truncate -s 70G /mnt/podman-storage.img
          sudo mkfs.btrfs -f /mnt/podman-storage.img
          sudo podman system reset --force
          sudo systemctl stop podman.service
          sudo mount -o compress-force=zstd:2 /mnt/podman-storage.img /var/lib/containers/storage
          sudo systemctl start podman.service

      - name: Authenticate podman to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | sudo podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build live payload container
        env:
          SOURCE_TAG: ${{ matrix.source_tag }}
        run: |
          SOURCE_TAG="${{ matrix.source_tag }}"
          BASE_IMAGE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${SOURCE_TAG}"

          # Titanoboa consumes this prepared live rootfs using the same
          # container-native LiveCD contract as Bazzite.
          sudo podman build \
            --cap-add SYS_ADMIN \
            --security-opt label=disable \
            --build-arg "BASE_IMAGE=${BASE_IMAGE}" \
            --build-arg "SOURCE_TAG=${SOURCE_TAG}" \
            --tag localhost/payload:latest \
            -f installer/Containerfile \
            .

      - name: Prepare ISO output directory
        run: mkdir -p output/live-iso

      - name: Build ISO with Titanoboa
        uses: Zeglius/titanoboa@7737f4748458252ac827dca14b3d6dd09298472a
        with:
          image-ref: localhost/payload:latest
          iso-dest: output/live-iso/kyth-live-${{ matrix.source_tag }}.iso

      - name: Verify ISO artifact
        run: |
          ISO="output/live-iso/kyth-live-${{ matrix.source_tag }}.iso"
          test -s "${ISO}"
          echo "==> Built $(du -h "${ISO}" | cut -f1) ISO: ${ISO}"

      - name: Generate ISO checksum
        run: |
          ISO="output/live-iso/kyth-live-${{ matrix.source_tag }}.iso"
          (cd "$(dirname "${ISO}")" && sha256sum "$(basename "${ISO}")" > "$(basename "${ISO}")-CHECKSUM")

      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
        with:
          cosign-release: 'v2.6.1'

      - name: Sign ISO
        run: |
          ISO="output/live-iso/kyth-live-${{ matrix.source_tag }}.iso"
          cosign sign-blob -y "${ISO}" \
            --output-signature "${ISO}.sig" \
            --bundle "${ISO}.bundle"

      - name: Attest ISO build provenance
        id: attest_iso
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: output/live-iso/kyth-live-${{ matrix.source_tag }}.iso

      - name: Generate ISO metadata
        env:
          SOURCE_TAG: ${{ matrix.source_tag }}
          ATTESTATION_URL: ${{ steps.attest_iso.outputs.attestation-url }}
        run: |
          ISO="output/live-iso/kyth-live-${{ matrix.source_tag }}.iso"
          SHA256="$(sha256sum "${ISO}" | awk '{print $1}')"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python3 - <<PY
          import json, os
          from pathlib import Path
          tag = os.environ["SOURCE_TAG"]
          iso = Path(f"output/live-iso/kyth-live-{tag}.iso")
          metadata = {
              "iso": iso.name,
              "sha256": "${SHA256}",
              "signature": iso.name + ".sig",
              "bundle": iso.name + ".bundle",
              "checksum": iso.name + "-CHECKSUM",
              "attestation_url": os.environ.get("ATTESTATION_URL", ""),
              "source_image": f"ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:{tag}",
              "source_tag": tag,
              "build_date": "${BUILD_DATE}",
          }
          Path(str(iso) + ".json").write_text(json.dumps(metadata, indent=2) + "\n")
          PY

      - name: Upload ISO artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: kyth-live-iso-${{ matrix.source_tag }}
          path: output/live-iso/kyth-live-${{ matrix.source_tag }}.iso*
          if-no-files-found: error

      - name: Upload ISO to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          ISO="output/live-iso/kyth-live-${{ matrix.source_tag }}.iso"
          for artifact in "${ISO}" "${ISO}-CHECKSUM" "${ISO}.sig" "${ISO}.bundle" "${ISO}.json"; do
            aws s3 cp "${artifact}" \
              "s3://kyth-releases/$(basename "${artifact}")" \
              --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
              --no-progress
          done

      - name: Publish release notes to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SOURCE_TAG="${{ matrix.source_tag }}"
          TAG="${{ matrix.source_tag == 'testing' && 'iso-testing' || 'iso-latest' }}"
          ISO_URL="https://pub-9a3cc72972ea44c4ae7504ee7cda1fa6.r2.dev/kyth-live-${SOURCE_TAG}.iso"
          CHECKSUM_URL="${ISO_URL}-CHECKSUM"
          if [ "${SOURCE_TAG}" = "testing" ]; then
            TITLE="Kyth Live ISO — Testing"
            NOTES=$(printf 'Built from `testing`. May be unstable.\n\n**[Download ISO](%s)**  |  [Checksum](%s)' "${ISO_URL}" "${CHECKSUM_URL}")
            PRERELEASE="--prerelease"
          else
            TITLE="Kyth Live ISO — Stable"
            NOTES=$(printf 'Built from `main`.\n\n**[Download ISO](%s)**  |  [Checksum](%s)' "${ISO_URL}" "${CHECKSUM_URL}")
            PRERELEASE="--latest"
          fi
          gh release delete "${TAG}" --yes --cleanup-tag 2>/dev/null || true
          gh release create "${TAG}" --title "${TITLE}" --notes "${NOTES}" ${PRERELEASE}
          ISO="output/live-iso/kyth-live-${SOURCE_TAG}.iso"
          gh release upload "${TAG}" "${ISO}-CHECKSUM" "${ISO}.sig" "${ISO}.bundle" "${ISO}.json"
