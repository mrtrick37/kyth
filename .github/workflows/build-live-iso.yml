name: Build Live ISO
run-name: "Build Live ISO — ${{ github.event_name == 'workflow_dispatch' && inputs.source_tag || github.event.workflow_run.head_branch }}"

on:
  workflow_run:
    workflows: ["Build container image"]
    types: [completed]
    branches: [main, testing]
  workflow_dispatch:
    inputs:
      source_tag:
        description: 'Source image tag to build ISO from'
        required: false
        default: 'latest'
        type: choice
        options:
          - latest
          - testing

env:
  # Opt into Node.js 24 for all actions — required before June 2026 when Node 20 is dropped.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Build the live container and push it to GHCR ──────────────────────
  # Uses docker buildx (BuildKit) which:
  #   • Has no 128-layer overlay2 limit — no need to flatten the base image
  #   • Streams layers directly to GHCR with --push, storing nothing locally
  build-live-container:
    name: Build live container (${{ matrix.source_tag }})
    runs-on: ubuntu-24.04
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    concurrency:
      group: build-live-container-${{ matrix.source_tag }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        source_tag: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', inputs.source_tag)) || (github.event.workflow_run.event == 'push' && fromJSON(format('["{0}"]', github.event.workflow_run.head_branch == 'testing' && 'testing' || 'latest')) || fromJSON('["latest","testing"]')) }}
    permissions:
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_sha || (matrix.source_tag == 'testing' && 'testing' || 'main') }}

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build and push live container directly to GHCR
        # BuildKit has no 128-layer limit and --push streams finished layers
        # straight to GHCR — nothing is written to local storage.
        # SOURCE_TAG is passed so the embedded kyth-installer.env URL matches the tag.
        run: |
          SOURCE_TAG="${{ matrix.source_tag }}"
          BASE_IMAGE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${SOURCE_TAG}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:live-build-${SOURCE_TAG}"
          CACHE_REF="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:live-buildcache-${SOURCE_TAG}"
          docker buildx build \
            --tag "${IMAGE}" \
            --build-arg BASE_IMAGE="${BASE_IMAGE}" \
            --build-arg SOURCE_TAG="${SOURCE_TAG}" \
            --cache-from "type=registry,ref=${CACHE_REF}" \
            --cache-to   "type=registry,ref=${CACHE_REF},mode=max" \
            -f build_files/Containerfile.live \
            --push \
            .

      - name: Flatten live container to a single layer
        # The live image inherits 100+ layers from the kyth base image.
        # docker pull in Job 2 hits Docker's 128-layer overlay2 limit before
        # it can even finish pulling. crane flatten squashes all layers into one
        # and pushes the result back to the same tag, so Job 2 can pull cleanly.
        run: |
          SOURCE_TAG="${{ matrix.source_tag }}"
          # crane v0.20.6 — pinned with SHA256 checksum.
          # To update: bump the version in the URL and update CRANE_SHA256.
          CRANE_SHA256="c1d593d01551f2c9a3df5ca0a0be4385a839bd9b86d4a76e18d7b17d16559127"
          CRANE_TARBALL="go-containerregistry_Linux_x86_64.tar.gz"
          curl -sSfL \
            "https://github.com/google/go-containerregistry/releases/download/v0.20.6/${CRANE_TARBALL}" \
            -o "/tmp/${CRANE_TARBALL}"
          echo "${CRANE_SHA256}  /tmp/${CRANE_TARBALL}" | sha256sum --check --strict
          tar -xz -C /usr/local/bin crane -f "/tmp/${CRANE_TARBALL}"
          rm -f "/tmp/${CRANE_TARBALL}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:live-build-${SOURCE_TAG}"
          echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u "${{ github.actor }}" --password-stdin
          crane flatten --http1 "${IMAGE}"

  # ── Job 2: Pull the container, export rootfs, build squashfs + ISO ───────────
  # Fresh runner — Docker image is pulled then immediately removed after export
  # so overlay2 storage doesn't overlap with the large squashfs + ISO on disk.
  build-iso:
    name: Build ISO (${{ matrix.source_tag }})
    needs: build-live-container
    runs-on: ubuntu-24.04
    concurrency:
      group: build-live-iso-${{ matrix.source_tag }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        source_tag: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', inputs.source_tag)) || (github.event.workflow_run.event == 'push' && fromJSON(format('["{0}"]', github.event.workflow_run.head_branch == 'testing' && 'testing' || 'latest')) || fromJSON('["latest","testing"]')) }}
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_sha || (matrix.source_tag == 'testing' && 'testing' || 'main') }}

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xorriso squashfs-tools mtools dosfstools git \
            grub-common grub-pc-bin grub-efi-amd64-bin
          # Install just from a pinned release with checksum verification.
          # To update: bump JUST_VER and JUST_SHA256 together.
          JUST_VER="1.49.0"
          JUST_SHA256="05eb2f068b641b06e5b318796c2e27d4dcca608e65b34329a08c1b9f582611bd"
          JUST_TARBALL="just-${JUST_VER}-x86_64-unknown-linux-musl.tar.gz"
          curl -fsSL \
            "https://github.com/casey/just/releases/download/${JUST_VER}/${JUST_TARBALL}" \
            -o "/tmp/${JUST_TARBALL}"
          echo "${JUST_SHA256}  /tmp/${JUST_TARBALL}" | sha256sum --check --strict
          tar -xf "/tmp/${JUST_TARBALL}" -C /tmp just
          sudo install -m 0755 /tmp/just /usr/local/bin/just
          rm -f "/tmp/${JUST_TARBALL}" /tmp/just
          sudo ln -sf /usr/bin/grub-mkimage /usr/local/bin/grub2-mkimage
          sudo ln -sf /usr/bin/grub-mkfont  /usr/local/bin/grub2-mkfont

      - name: Pull pre-built live container
        # Import with the tag name build-live-iso.sh expects:
        #   latest  → kyth-live:build
        #   testing → kyth-live:build-testing
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          SOURCE_TAG="${{ matrix.source_tag }}"
          if [[ "${SOURCE_TAG}" == "latest" ]]; then
            LIVE_TAG="kyth-live:build"
          else
            LIVE_TAG="kyth-live:build-${SOURCE_TAG}"
          fi

          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:live-build-${SOURCE_TAG}"
          docker pull "${IMAGE}"
          CID=$(docker create "${IMAGE}" /bin/true)
          docker export "${CID}" | docker import - "${LIVE_TAG}"
          docker rm "${CID}"
          docker rmi "${IMAGE}" || true

      - name: Ensure permissions and directories
        run: |
          mkdir -p output/live-iso
          chmod -R 777 output
          chmod -R 777 build_files
          chmod +x build_files/build-live-iso.sh

      - name: Build Live ISO
        # SKIP_REBUILD=1: kyth-live:build was pre-built in job 1 and
        # imported above — skip the staleness check and go straight to
        # container export + squashfs + ISO.
        # Prune Docker storage right after container export to reclaim the
        # overlay2 footprint before mksquashfs runs.
        env:
          SKIP_REBUILD: "1"
        run: |
          SOURCE_TAG="${{ matrix.source_tag }}"
          if [[ "${SOURCE_TAG}" == "latest" ]]; then
            LIVE_TAG="kyth-live:build"
          else
            LIVE_TAG="kyth-live:build-${SOURCE_TAG}"
          fi

          just build-live-iso "${SOURCE_TAG}" &
          BUILD_PID=$!

          while kill -0 $BUILD_PID 2>/dev/null; do
            ROOTFS=$(find /var/tmp -maxdepth 2 -name rootfs -type d 2>/dev/null | head -1)
            if [[ -n "${ROOTFS}" && -f "${ROOTFS}/etc/os-release" ]]; then
              echo "==> Container exported to ${ROOTFS} — pruning Docker overlay2"
              docker rmi "${LIVE_TAG}" || true
              docker system prune -f || true
              break
            fi
            sleep 5
          done

          wait $BUILD_PID

      - name: Upload ISO artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: kyth-live-iso-${{ matrix.source_tag }}
          path: output/live-iso/kyth-live-${{ matrix.source_tag }}.iso
          if-no-files-found: error

      - name: Upload ISO to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          ISO="output/live-iso/kyth-live-${{ matrix.source_tag }}.iso"
          aws s3 cp "${ISO}" \
            "s3://kyth-releases/$(basename ${ISO})" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --no-progress

      - name: Publish release notes to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SOURCE_TAG="${{ matrix.source_tag }}"
          TAG="${{ matrix.source_tag == 'testing' && 'iso-testing' || 'iso-latest' }}"
          ISO_URL="https://pub-9a3cc72972ea44c4ae7504ee7cda1fa6.r2.dev/kyth-live-${SOURCE_TAG}.iso"

          if [ "${SOURCE_TAG}" = "testing" ]; then
            TITLE="Kyth Live ISO — Testing"
            NOTES=$(printf 'Built from the `testing` branch. May be unstable.\n\n**Download:** [kyth-live-testing.iso](%s)' "${ISO_URL}")
            PRERELEASE="--prerelease"
          else
            TITLE="Kyth Live ISO — Stable"
            NOTES=$(printf 'Built from the `main` branch.\n\n**Download:** [kyth-live-latest.iso](%s)' "${ISO_URL}")
            PRERELEASE="--latest"
          fi

          gh release delete "${TAG}" --yes --cleanup-tag 2>/dev/null || true
          gh release create "${TAG}" \
            --title "${TITLE}" \
            --notes "${NOTES}" \
            ${PRERELEASE}
