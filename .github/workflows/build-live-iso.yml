name: Build Live ISO

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-live-iso:
    runs-on: ubuntu-latest
    container:
      image: fedora:39
    steps:
      - name: Install dependencies
        run: |
          dnf install -y podman just xorriso squashfs-tools mtools dosfstools git

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Live ISO
        run: |
          just build-live-iso

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: kyth-live-iso
          path: output/live-iso/kyth-live.iso
          if-no-files-found: error
