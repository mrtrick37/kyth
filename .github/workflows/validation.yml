name: Validation

on:
  pull_request:
    branches:
      - main
      - testing
  push:
    branches:
      - main
      - testing
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validation-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONLINT_VERSION: 1.7.7
  HADOLINT_VERSION: 2.14.0
  JUST_VERSION: 1.52.0
  ZIZMOR_VERSION: 1.25.2
  ZIZMOR_SHA256: aa1facd105f0d83fe5c55b1adcd9d7417de5d83aa27471f91dc0b66cf3803577

jobs:
  validation:
    name: validation
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Cache validation tools
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .cache/kyth-ci-tools
          key: validation-tools-${{ runner.os }}-${{ env.ACTIONLINT_VERSION }}-${{ env.HADOLINT_VERSION }}
      - name: Install pinned validators
        run: |
          exec 5>>"${GITHUB_PATH}"
          set -euo pipefail
          cache_dir="${KYTH_CI_TOOL_CACHE:-${GITHUB_WORKSPACE}/.cache/kyth-ci-tools}"
          bin_dir="${HOME}/.local/bin"
          mkdir -p "${cache_dir}" "${bin_dir}"
          echo "${bin_dir}" >&5

          actionlint_bin="${cache_dir}/actionlint-${ACTIONLINT_VERSION}"
          if [[ ! -x "${actionlint_bin}" ]]; then
            work="$(mktemp -d)"
            actionlint_archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
            actionlint_base="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}"
            curl -fsSL -o "${work}/${actionlint_archive}" "${actionlint_base}/${actionlint_archive}"
          curl -fsSL -o "${work}/checksums.txt" "${actionlint_base}/actionlint_${ACTIONLINT_VERSION}_checksums.txt"
            (cd "${work}" && grep " ${actionlint_archive}$" checksums.txt | sha256sum -c -)
            tar -xzf "${work}/${actionlint_archive}" -C "${work}" actionlint
            install -m 0755 "${work}/actionlint" "${actionlint_bin}"
            rm -rf "${work}"
          fi
          install -m 0755 "${actionlint_bin}" "${bin_dir}/actionlint"

          hadolint_bin="${cache_dir}/hadolint-${HADOLINT_VERSION}"
          if [[ ! -x "${hadolint_bin}" ]]; then
            work="$(mktemp -d)"
            hadolint_binary="hadolint-linux-x86_64"
            hadolint_base="https://github.com/hadolint/hadolint/releases/download/v${HADOLINT_VERSION}"
            curl -fsSL -o "${work}/${hadolint_binary}" "${hadolint_base}/${hadolint_binary}"
            curl -fsSL -o "${work}/${hadolint_binary}.sha256" "${hadolint_base}/${hadolint_binary}.sha256"
            (cd "${work}" && sha256sum -c "${hadolint_binary}.sha256")
            install -m 0755 "${work}/${hadolint_binary}" "${hadolint_bin}"
            rm -rf "${work}"
          fi
          install -m 0755 "${hadolint_bin}" "${bin_dir}/hadolint"
      - name: Validate GitHub Actions workflows
        run: |
          actionlint -color -shellcheck=""
          zizmor --persona auditor --min-severity medium --no-online-audits .github/workflows

      - name: Validate container build files
        run: |
          hadolint --failure-threshold error \
            Dockerfile \
            build_base/Dockerfile \
            build_base/Containerfile.docker-overlay \
            installer/Containerfile

      - name: Validate shell scripts
        run: |
          set -euo pipefail
          shell_files=()
          while IFS= read -r -d '' file; do
            mime_type="$(file --brief --mime-type "${file}")"
            if [[ "${mime_type}" == "text/x-shellscript" ]]; then
              shell_files+=("${file}")
            fi
          done < <(git ls-files -z)

          if (( ${#shell_files[@]} == 0 )); then
            echo "No shell scripts found"
            exit 1
          fi

          printf 'Checking %d shell scripts\n' "${#shell_files[@]}"
          shellcheck --severity=error "${shell_files[@]}"
          for file in "${shell_files[@]}"; do
            bash -n "${file}"
          done

      - name: Validate Python syntax
        run: |
          python3 - <<'PY'
          import ast
          import subprocess
          from pathlib import Path

          files = subprocess.check_output(
              ["git", "ls-files", "*.py"], text=True
          ).splitlines()
          for name in files:
              path = Path(name)
              ast.parse(path.read_text(encoding="utf-8"), filename=name)
          print(f"Checked {len(files)} Python files")
          PY

      - name: Check for obvious committed secrets
        run: |
          python3 - <<'PY'
          import re
          import subprocess
          from pathlib import Path

          patterns = {
              "private key block": re.compile(r"-----BEGIN [A-Z ]*PRIVATE KEY-----"),
              "GitHub token": re.compile(r"\b(?:ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9_]{36,}\b"),
              "GitHub fine-grained token": re.compile(r"\bgithub_pat_[A-Za-z0-9_]{80,}\b"),
              "AWS access key": re.compile(r"\b(?:AKIA|ASIA)[0-9A-Z]{16}\b"),
              "Slack token": re.compile(r"\bxox[baprs]-[A-Za-z0-9-]{20,}\b"),
          }
          binary_suffixes = {".cer", ".png", ".jpg", ".jpeg", ".webp", ".ico"}
          files = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          findings = []
          for name in files:
              path = Path(name)
              if path.suffix.lower() in binary_suffixes:
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              for label, pattern in patterns.items():
                  if pattern.search(text):
                      findings.append(f"{name}: matched {label}")
          if findings:
              print("Potential committed secrets found:")
              print("\n".join(findings))
              raise SystemExit(1)
          print(f"Checked {len(files)} tracked files for high-confidence secret patterns")
          PY

      - name: Run Python unit tests
        run: python3 -m unittest discover -s tests

      - name: Validate structured configuration
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            jq empty "${file}"
          done < <(git ls-files -z '*.json')

          python3 - <<'PY'
          import subprocess
          import tomllib
          from pathlib import Path

          files = subprocess.check_output(
              ["git", "ls-files", "*.toml"], text=True
          ).splitlines()
          for name in files:
              with Path(name).open("rb") as stream:
                  tomllib.load(stream)
          print(f"Checked {len(files)} TOML files")
          PY

      - name: Validate systemd units
        run: |
          set -euo pipefail
          output="$(systemd-analyze verify build_files/*.service build_files/*.timer 2>&1 || true)"
          printf '%s\n' "${output}"

          # The Ubuntu runner does not contain commands installed into the
          # finished KythOS image. Keep every other verifier diagnostic fatal.
          unexpected="$(printf '%s\n' "${output}" \
            | grep -Ev \
              -e '^[^:]+: Command .+ is not executable: No such file or directory$' \
              -e '^Failed to turn off SO_PASSRIGHTS on user lookup socket, ignoring: Operation not permitted$' \
              -e '^Failed to enable SO_PASSCRED on handoff timestamp socket: Operation not permitted$' \
            || true)"
          if [[ -n "${unexpected}" ]]; then
            printf 'Unexpected systemd verification errors:\n%s\n' "${unexpected}" >&2
            exit 1
          fi

      - name: Validate Just recipes
        run: |
          set -euo pipefail
          just --list >/dev/null
          while IFS= read -r -d '' file; do
            just --justfile "${file}" --list >/dev/null
          done < <(git ls-files -z '*.just')
