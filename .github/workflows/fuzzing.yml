# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Fuzzing

on:
  pull_request:
    branches:
      - main
      - testing
    paths:
      - 'build_files/kyth-welcome/**'
      - 'fuzz/**'
      - '.clusterfuzzlite/**'
      - '.github/workflows/fuzzing.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzzing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-fuzzing:
    name: Python fuzzing
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install atheris
        run: |
          python -m pip install --require-hashes --only-binary=:all: -r fuzz/requirements.txt

      - name: Smoke test
        env:
          KYTH_FUZZ_SMOKE: "1"
        run: python fuzz/kyth_welcome_fuzzer.py

      - name: Fuzz (60 s)
        run: python fuzz/kyth_welcome_fuzzer.py -max_total_time=60 -print_final_stats=1
