# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Fuzzing

on:
  pull_request:
    branches:
      - main
      - testing
    paths:
      - 'build_files/kyth-welcome/**'
      - 'fuzz/**'
      - '.clusterfuzzlite/**'
      - '.github/workflows/fuzzing.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzzing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-fuzzing:
    name: Python fuzzing
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install atheris
        run: |
          python -m pip install --require-hashes --only-binary=:all: -r fuzz/requirements.txt

      - name: Smoke test
        env:
          KYTH_FUZZ_SMOKE: "1"
        run: python fuzz/kyth_welcome_fuzzer.py

      - name: Fuzz (60 s)
        run: python fuzz/kyth_welcome_fuzzer.py -max_total_time=60 -print_final_stats=1
