# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: ClusterFuzzLite

on:
  pull_request:
    branches:
      - main
      - testing
    paths:
      - 'build_files/kyth-welcome/**'
      - 'fuzz/**'
      - '.clusterfuzzlite/**'
      - '.github/workflows/fuzzing.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzzing-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  python-fuzzing:
    name: Python fuzzing (${{ matrix.sanitizer }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        sanitizer:
          - address
          - undefined

    steps:
      - name: Build fuzzers
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@82652fb49e77bc29c35da1167bb286e93c6bcc05 # v1
        with:
          language: python
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sanitizer: ${{ matrix.sanitizer }}

      - name: Run fuzzers
        id: run
        uses: google/clusterfuzzlite/actions/run_fuzzers@82652fb49e77bc29c35da1167bb286e93c6bcc05 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 120
          mode: code-change
          sanitizer: ${{ matrix.sanitizer }}
          parallel-fuzzing: true
