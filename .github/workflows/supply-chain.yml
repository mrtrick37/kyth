# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Supply Chain Metadata

on:
  workflow_run:
    workflows: ["Build container image"]
    types: [completed]
    branches: [main, testing]
  workflow_dispatch:
    inputs:
      source_tag:
        description: Image tag to process
        required: true
        default: testing
        type: choice
        options:
          - latest
          - testing
      source_digest:
        description: Immutable image digest to process (required for manual runs)
        required: true
        type: string
      source_sha:
        description: Source commit recorded in the image (required for manual runs)
        required: true
        type: string

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    name: Prepare metadata (${{ matrix.source_tag }})
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    # The Fedora image publishes this handoff independently of the optional
    # CachyOS matrix leg. A failed CachyOS build must not block Fedora metadata.
    # If Fedora itself failed, the artifact download below fails visibly.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure'
    strategy:
      fail-fast: false
      matrix:
        source_tag: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', inputs.source_tag)) || (github.event.workflow_run.event == 'schedule' && fromJSON('["latest","testing"]') || fromJSON(format('["{0}"]', github.event.workflow_run.head_branch == 'testing' && 'testing' || 'latest'))) }}
    permissions:
      actions: read
      contents: read
      packages: read
    concurrency:
      group: supply-chain-prepare-${{ matrix.source_tag }}
      cancel-in-progress: false

    steps:
      - name: Download immutable build metadata
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: image-build-metadata-${{ matrix.source_tag }}
          path: output/build-handoff
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Read immutable build metadata
        if: github.event_name == 'workflow_run'
        id: handoff
        env:
          EXPECTED_TAG: ${{ matrix.source_tag }}
          EXPECTED_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          METADATA=output/build-handoff/image.json
          jq -e . "${METADATA}" >/dev/null
          test "$(jq -r .source_tag "${METADATA}")" = "${EXPECTED_TAG}"
          test "$(jq -r .workflow_run_id "${METADATA}")" = "${EXPECTED_RUN_ID}"
          echo "image=$(jq -r .image "${METADATA}")" >> "$GITHUB_OUTPUT"
          echo "digest=$(jq -r .digest "${METADATA}")" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r .version "${METADATA}")" >> "$GITHUB_OUTPUT"
          echo "source_sha=$(jq -r .source_sha "${METADATA}")" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_run' && steps.handoff.outputs.source_sha || inputs.source_sha }}
          persist-credentials: false

      - name: Maximize build space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: true

      - name: Prepare metadata variables
        id: meta
        env:
          SOURCE_TAG: ${{ matrix.source_tag }}
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${SOURCE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Install ORAS
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0
        with:
          version: 1.3.1

      - name: Validate immutable image identity and resolve previous digest
        id: image
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          TAG: ${{ steps.meta.outputs.tag }}
          HANDOFF_IMAGE: ${{ steps.handoff.outputs.image }}
          HANDOFF_DIGEST: ${{ steps.handoff.outputs.digest }}
          HANDOFF_VERSION: ${{ steps.handoff.outputs.version }}
          HANDOFF_SHA: ${{ steps.handoff.outputs.source_sha }}
          MANUAL_DIGEST: ${{ inputs.source_digest }}
          MANUAL_SHA: ${{ inputs.source_sha }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            test "${HANDOFF_IMAGE}" = "${IMAGE}"
            CURRENT_DIGEST="${HANDOFF_DIGEST}"
            CURRENT_VERSION="${HANDOFF_VERSION}"
            SOURCE_SHA="${HANDOFF_SHA}"
          else
            CURRENT_DIGEST="${MANUAL_DIGEST}"
            SOURCE_SHA="${MANUAL_SHA}"
            [[ "${CURRENT_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]
            CURRENT_VERSION="$(docker buildx imagetools inspect "${IMAGE}@${CURRENT_DIGEST}" --format '{{ index .Image.Config.Labels "org.opencontainers.image.version" }}')"
          fi

          [[ "${CURRENT_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "${SOURCE_SHA}" =~ ^[0-9a-f]{40}$ ]]
          ACTUAL_VERSION="$(docker buildx imagetools inspect "${IMAGE}@${CURRENT_DIGEST}" --format '{{ index .Image.Config.Labels "org.opencontainers.image.version" }}')"
          ACTUAL_REVISION="$(docker buildx imagetools inspect "${IMAGE}@${CURRENT_DIGEST}" --format '{{ index .Image.Config.Labels "org.opencontainers.image.revision" }}')"
          BASE_NAME="$(docker buildx imagetools inspect "${IMAGE}@${CURRENT_DIGEST}" --format '{{ index .Image.Config.Labels "org.opencontainers.image.base.name" }}')"
          BASE_DIGEST="$(docker buildx imagetools inspect "${IMAGE}@${CURRENT_DIGEST}" --format '{{ index .Image.Config.Labels "org.opencontainers.image.base.digest" }}')"
          UPSTREAM_BASE="$(docker buildx imagetools inspect "${IMAGE}@${CURRENT_DIGEST}" --format '{{ index .Image.Config.Labels "org.kyth.build.upstream-base" }}')"
          GE_PROTON_VERSION="$(docker buildx imagetools inspect "${IMAGE}@${CURRENT_DIGEST}" --format '{{ index .Image.Config.Labels "org.kyth.build.ge-proton-version" }}')"
          THIRDPARTY_HASH="$(docker buildx imagetools inspect "${IMAGE}@${CURRENT_DIGEST}" --format '{{ index .Image.Config.Labels "org.kyth.build.thirdparty-versions-hash" }}')"
          KERNEL_FLAVOR="$(docker buildx imagetools inspect "${IMAGE}@${CURRENT_DIGEST}" --format '{{ index .Image.Config.Labels "org.kyth.build.kernel-flavor" }}')"
          test "${ACTUAL_VERSION}" = "${CURRENT_VERSION}"
          test "${ACTUAL_REVISION}" = "${SOURCE_SHA}"
          test "${SOURCE_SHA}" = "$(git rev-parse HEAD)"
          [[ "${CURRENT_VERSION}" =~ ^${TAG}\.[0-9]{8}\.[0-9]+\.[0-9]+\.[0-9a-f]{8}$ ]]
          test "${BASE_NAME}" = "${IMAGE}:base-${TAG}"
          [[ "${BASE_NAME}" =~ ^ghcr\.io/[a-z0-9._/-]+:[a-z0-9._-]+$ ]]
          [[ "${BASE_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "${UPSTREAM_BASE}" =~ ^ghcr\.io/ublue-os/kinoite-main:44@sha256:[0-9a-f]{64}$ ]]
          test -n "${GE_PROTON_VERSION}"
          [[ "${THIRDPARTY_HASH}" =~ ^[0-9a-f]{16}$ ]]
          test "${KERNEL_FLAVOR}" = fedora

          PREVIOUS_TAG="$(oras repo tags "${IMAGE}" \
            | grep -E "^${TAG}\.[0-9]{8}\.[0-9]+\.[0-9]+\.[0-9a-f]{8}$" \
            | grep -vx "${CURRENT_VERSION}" \
            | sort -V \
            | tail -n1 || true)"
          PREVIOUS_DIGEST=""
          if [[ -n "${PREVIOUS_TAG}" ]]; then
            PREVIOUS_DIGEST="$(docker buildx imagetools inspect "${IMAGE}:${PREVIOUS_TAG}" --format '{{ .Manifest.Digest }}' 2>/dev/null || true)"
          fi

          echo "current_digest=${CURRENT_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "previous_digest=${PREVIOUS_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "source_sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"
          echo "base_name=${BASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "base_digest=${BASE_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "upstream_base=${UPSTREAM_BASE}" >> "$GITHUB_OUTPUT"
          echo "ge_proton_version=${GE_PROTON_VERSION}" >> "$GITHUB_OUTPUT"
          echo "thirdparty_hash=${THIRDPARTY_HASH}" >> "$GITHUB_OUTPUT"
          echo "kernel_flavor=${KERNEL_FLAVOR}" >> "$GITHUB_OUTPUT"

      - name: Setup Syft
        id: setup_syft
        env:
          SYFT_VERSION: 1.39.0
          SYFT_SHA256: bb8f1ba8201d1ce0d99ab4f5243142629c1afba4da97a7c4ca2df97327f97190
        run: |
          ARCHIVE="syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          URL="https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/${ARCHIVE}"
          curl --fail --location --silent --show-error --output "${RUNNER_TEMP}/${ARCHIVE}" "${URL}"
          echo "${SYFT_SHA256}  ${RUNNER_TEMP}/${ARCHIVE}" | sha256sum --check
          tar --extract --gzip --file "${RUNNER_TEMP}/${ARCHIVE}" --directory "${RUNNER_TEMP}" syft
          chmod +x "${RUNNER_TEMP}/syft"
          echo "cmd=${RUNNER_TEMP}/syft" >> "$GITHUB_OUTPUT"

      - name: Generate image SBOM
        id: sbom
        timeout-minutes: 30
        env:
          SYFT_CMD: ${{ steps.setup_syft.outputs.cmd }}
          IMAGE: ${{ steps.meta.outputs.image }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.image.outputs.current_version }}
          DIGEST: ${{ steps.image.outputs.current_digest }}
        run: |
          SBOM="kyth-${TAG}-${VERSION}.syft.json"
          "${SYFT_CMD}" "registry:${IMAGE}@${DIGEST}" \
            --source-name "${IMAGE}@${DIGEST}" \
            -o "syft-json=${SBOM}"
          echo "path=${SBOM}" >> "$GITHUB_OUTPUT"

      - name: Capture RPM manifest
        id: rpm_manifest
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.image.outputs.current_version }}
          SBOM_PATH: ${{ steps.sbom.outputs.path }}
        run: |
          OUT_FILE="rpm-manifest-${TAG}-${VERSION}.txt"
          python3 - "${SBOM_PATH}" "${OUT_FILE}" <<'PY'
          import json, sys
          from pathlib import Path
          sbom = json.loads(Path(sys.argv[1]).read_text())
          pkgs = []
          for a in sbom.get("artifacts", []):
              if a.get("type") != "rpm":
                  continue
              m = a.get("metadata") or {}
              name = a["name"]
              arch = m.get("architecture", "")
              meta_ver = m.get("version", "")
              meta_rel = m.get("release", "")
              if meta_ver and meta_rel:
                  pkgs.append(f"{name}-{meta_ver}-{meta_rel}.{arch}")
              else:
                  ver = a.get("version", "")
                  pkgs.append(f"{name}-{ver}.{arch}" if arch else f"{name}-{ver}")
          pkgs.sort()
          Path(sys.argv[2]).write_text("\n".join(pkgs) + "\n")
          PY
          echo "path=${OUT_FILE}" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM-powered changelog
        id: changelog
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          CURRENT_TAG: ${{ steps.image.outputs.current_version }}
          CURRENT_DIGEST: ${{ steps.image.outputs.current_digest }}
          PREVIOUS_DIGEST: ${{ steps.image.outputs.previous_digest }}
          CURRENT_SHA: ${{ steps.image.outputs.source_sha }}
          SOURCE_TAG: ${{ matrix.source_tag }}
        run: |
          NOTES="image-changelog-${CURRENT_TAG}.md"
          BRANCH=main
          if [[ "${SOURCE_TAG}" == "testing" ]]; then
            BRANCH=testing
          fi
          python3 .github/scripts/kyth_changelog.py \
            --image "${IMAGE}" \
            --branch "${BRANCH}" \
            --current-tag "${CURRENT_TAG}" \
            --current-digest "${CURRENT_DIGEST}" \
            --previous-digest "${PREVIOUS_DIGEST}" \
            --current-sha "${CURRENT_SHA}" \
            --output "${NOTES}"
          echo "path=${NOTES}" >> "$GITHUB_OUTPUT"

      - name: Package publish inputs
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          TAG: ${{ steps.meta.outputs.tag }}
          SOURCE_SHA: ${{ steps.image.outputs.source_sha }}
          CURRENT_DIGEST: ${{ steps.image.outputs.current_digest }}
          CURRENT_VERSION: ${{ steps.image.outputs.current_version }}
          PREVIOUS_DIGEST: ${{ steps.image.outputs.previous_digest }}
          BASE_NAME: ${{ steps.image.outputs.base_name }}
          BASE_DIGEST: ${{ steps.image.outputs.base_digest }}
          UPSTREAM_BASE: ${{ steps.image.outputs.upstream_base }}
          GE_PROTON_VERSION: ${{ steps.image.outputs.ge_proton_version }}
          THIRDPARTY_HASH: ${{ steps.image.outputs.thirdparty_hash }}
          KERNEL_FLAVOR: ${{ steps.image.outputs.kernel_flavor }}
          RPM_MANIFEST: ${{ steps.rpm_manifest.outputs.path }}
          SBOM: ${{ steps.sbom.outputs.path }}
          NOTES: ${{ steps.changelog.outputs.path }}
        run: |
          mkdir -p output/supply-chain
          cp "${RPM_MANIFEST}" "${SBOM}" "${NOTES}" output/supply-chain/
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          metadata = {
              "image": os.environ["IMAGE"],
              "tag": os.environ["TAG"],
              "source_sha": os.environ["SOURCE_SHA"],
              "current_digest": os.environ["CURRENT_DIGEST"],
              "current_version": os.environ["CURRENT_VERSION"],
              "previous_digest": os.environ["PREVIOUS_DIGEST"],
              "materials": {
                  "build_base": os.environ["BASE_NAME"] + "@" + os.environ["BASE_DIGEST"],
                  "upstream_base": os.environ["UPSTREAM_BASE"],
                  "ge_proton_version": os.environ["GE_PROTON_VERSION"],
                  "thirdparty_versions_hash": os.environ["THIRDPARTY_HASH"],
                  "kernel_flavor": os.environ["KERNEL_FLAVOR"],
              },
              "rpm_manifest": Path(os.environ["RPM_MANIFEST"]).name,
              "sbom": Path(os.environ["SBOM"]).name,
              "notes": Path(os.environ["NOTES"]).name,
          }
          Path("output/supply-chain/metadata.json").write_text(
              json.dumps(metadata, indent=2) + "\n"
          )
          PY

      - name: Upload prepared metadata
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: supply-chain-input-${{ matrix.source_tag }}-${{ github.run_id }}
          path: output/supply-chain/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish metadata (${{ matrix.source_tag }})
    needs: prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: ${{ matrix.source_tag == 'testing' && 'testing-release' || 'stable-release' }}
    strategy:
      fail-fast: false
      matrix:
        source_tag: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', inputs.source_tag)) || (github.event.workflow_run.event == 'schedule' && fromJSON('["latest","testing"]') || fromJSON(format('["{0}"]', github.event.workflow_run.head_branch == 'testing' && 'testing' || 'latest'))) }}
    permissions:
      actions: read
      contents: write
      packages: write
      id-token: write
    concurrency:
      group: supply-chain-publish-${{ matrix.source_tag }}
      cancel-in-progress: false

    steps:
      - name: Download prepared metadata
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: supply-chain-input-${{ matrix.source_tag }}-${{ github.run_id }}
          path: output/supply-chain

      - name: Validate publish inputs
        id: meta
        run: |
          METADATA=output/supply-chain/metadata.json
          jq -e . "${METADATA}" >/dev/null
          IMAGE="$(jq -r .image "${METADATA}")"
          TAG="$(jq -r .tag "${METADATA}")"
          SOURCE_SHA="$(jq -r .source_sha "${METADATA}")"
          DIGEST="$(jq -r .current_digest "${METADATA}")"
          VERSION="$(jq -r .current_version "${METADATA}")"
          BUILD_BASE="$(jq -r .materials.build_base "${METADATA}")"
          UPSTREAM_BASE="$(jq -r .materials.upstream_base "${METADATA}")"
          GE_PROTON_VERSION="$(jq -r .materials.ge_proton_version "${METADATA}")"
          THIRDPARTY_HASH="$(jq -r .materials.thirdparty_versions_hash "${METADATA}")"
          KERNEL_FLAVOR="$(jq -r .materials.kernel_flavor "${METADATA}")"
          SBOM="$(jq -r .sbom "${METADATA}")"
          NOTES="$(jq -r .notes "${METADATA}")"

          [[ "${IMAGE}" =~ ^ghcr\.io/[a-z0-9._/-]+$ ]]
          [[ "${TAG}" == "latest" || "${TAG}" == "testing" ]]
          [[ "${TAG}" == "${{ matrix.source_tag }}" ]]
          [[ "${SOURCE_SHA}" =~ ^[0-9a-f]{40}$ ]]
          [[ "${DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "${VERSION}" =~ ^[a-z0-9._-]+$ ]]
          [[ "${BUILD_BASE}" =~ ^ghcr\.io/[a-z0-9._/-]+:[a-z0-9._-]+@sha256:[0-9a-f]{64}$ ]]
          [[ "${UPSTREAM_BASE}" =~ ^ghcr\.io/ublue-os/kinoite-main:44@sha256:[0-9a-f]{64}$ ]]
          test -n "${GE_PROTON_VERSION}"
          [[ "${THIRDPARTY_HASH}" =~ ^[0-9a-f]{16}$ ]]
          test "${KERNEL_FLAVOR}" = fedora
          [[ "${SBOM}" == "$(basename "${SBOM}")" && -s "output/supply-chain/${SBOM}" ]]
          [[ "${NOTES}" == "$(basename "${NOTES}")" && -s "output/supply-chain/${NOTES}" ]]

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "source_sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sbom=${SBOM}" >> "$GITHUB_OUTPUT"
          echo "notes=${NOTES}" >> "$GITHUB_OUTPUT"

      - name: Install ORAS
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0
        with:
          version: 1.3.1

      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
        with:
          cosign-release: v2.6.1

      - name: Log in to GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${GH_TOKEN}" | oras login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Sign container image
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          DIGEST: ${{ steps.meta.outputs.digest }}
        run: |
          cosign sign -y "${IMAGE}@${DIGEST}"

      - name: Attach and sign SBOM
        id: attach_sbom
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          DIGEST: ${{ steps.meta.outputs.digest }}
          VERSION: ${{ steps.meta.outputs.version }}
          SBOM: output/supply-chain/${{ steps.meta.outputs.sbom }}
        run: |
          ATTACH_OUTPUT="$(oras attach --format json \
            --artifact-type application/vnd.syft+json \
            --annotation "org.opencontainers.image.title=$(basename "${SBOM}")" \
            --annotation "org.opencontainers.image.description=Syft SBOM for Kyth image ${VERSION}" \
            --annotation "org.opencontainers.image.version=${VERSION}" \
            "${IMAGE}@${DIGEST}" \
            "${SBOM}")"
          SBOM_DIGEST="$(jq -r '.digest' <<< "${ATTACH_OUTPUT}")"
          [[ "${SBOM_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]
          echo "digest=${SBOM_DIGEST}" >> "$GITHUB_OUTPUT"
          cosign sign -y "${IMAGE}@${SBOM_DIGEST}"

      - name: Verify published signatures and build provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ steps.meta.outputs.image }}
          DIGEST: ${{ steps.meta.outputs.digest }}
          SBOM_DIGEST: ${{ steps.attach_sbom.outputs.digest }}
          SOURCE_SHA: ${{ steps.meta.outputs.source_sha }}
        run: |
          IDENTITY="^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/supply-chain\\.yml@refs/heads/(main|testing)$"
          ISSUER="https://token.actions.githubusercontent.com"

          cosign verify \
            --certificate-identity-regexp "${IDENTITY}" \
            --certificate-oidc-issuer "${ISSUER}" \
            "${IMAGE}@${DIGEST}"
          cosign verify \
            --certificate-identity-regexp "${IDENTITY}" \
            --certificate-oidc-issuer "${ISSUER}" \
            "${IMAGE}@${SBOM_DIGEST}"

          for attempt in 1 2 3 4 5; do
            if gh attestation verify "oci://${IMAGE}@${DIGEST}" \
              --repo "${GITHUB_REPOSITORY}" \
              --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/build.yml" \
              --source-digest "${SOURCE_SHA}" \
              --deny-self-hosted-runners; then
              exit 0
            fi
            echo "Provenance not visible yet (attempt ${attempt}/5); retrying..."
            sleep 10
          done
          echo "::error::Build provenance could not be verified for ${IMAGE}@${DIGEST}"
          exit 1

      - name: Publish image changelog release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
          SOURCE_SHA: ${{ steps.meta.outputs.source_sha }}
          NOTES: output/supply-chain/${{ steps.meta.outputs.notes }}
          SOURCE_TAG: ${{ matrix.source_tag }}
        run: |
          RELEASE_TAG="image-${VERSION//./-}"
          TITLE="Kyth Image - ${VERSION}"
          PRERELEASE=""
          if [[ "${SOURCE_TAG}" != "latest" ]]; then
            PRERELEASE="--prerelease"
          fi

          if gh release view "${RELEASE_TAG}" &>/dev/null; then
            gh release edit "${RELEASE_TAG}" --title "${TITLE}" --notes-file "${NOTES}" ${PRERELEASE}
          else
            gh release create "${RELEASE_TAG}" \
              --target "${SOURCE_SHA}" \
              --title "${TITLE}" \
              --notes-file "${NOTES}" \
              ${PRERELEASE}
          fi
