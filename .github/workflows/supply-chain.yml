# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Supply Chain Metadata

on:
  workflow_run: # zizmor: ignore[dangerous-triggers] consumes completed internal image-build workflows only
    workflows: ["Build container image"]
    types: [completed]
    branches: [latest, testing]
  workflow_dispatch:
    inputs:
      source_tag:
        description: Image tag to process
        required: true
        default: testing
        type: choice
        options:
          - latest
          - testing
      source_digest:
        description: Immutable image digest to process (required for manual runs)
        required: true
        type: string
      source_sha:
        description: Source commit recorded in the image (required for manual runs)
        required: true
        type: string
      source_github_sha:
        description: Triggering GITHUB_SHA from the build workflow. May differ from source_sha for schedule-triggered builds of non-default branches.
        required: false
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    name: Prepare metadata (${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || inputs.source_tag }})
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: read
      packages: read
    concurrency:
      group: supply-chain-prepare-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || inputs.source_tag }}
      cancel-in-progress: false

    steps:
      - name: Validate dispatch inputs
        env:
          SOURCE_DIGEST: ${{ github.event_name == 'workflow_run' && '' || inputs.source_digest }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          SOURCE_GITHUB_SHA: ${{ inputs.source_github_sha }}
        run: |
          [[ "${SOURCE_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "${SOURCE_SHA}" =~ ^[0-9a-f]{40}$ ]]
          [[ -z "${SOURCE_GITHUB_SHA}" || "${SOURCE_GITHUB_SHA}" =~ ^[0-9a-f]{40}$ ]]

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}
          persist-credentials: false

      - name: Preflight source image
        run: |
          set -euo pipefail
          tag="${SOURCE_TAG}"
          image="ghcr.io/${GITHUB_REPOSITORY,,}:${tag}"
          echo "Checking ${image} before preparing supply-chain metadata"
          docker manifest inspect "${image}" >/dev/null
        env:
          SOURCE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || inputs.source_tag }}
      - name: Prepare metadata variables
        id: meta
        env:
          SOURCE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || inputs.source_tag }}
        run: |
          exec 3>>"${GITHUB_OUTPUT}"
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image=${IMAGE}" >&3
          echo "tag=${SOURCE_TAG}" >&3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Install ORAS
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0
        with:
          version: 1.3.1

      - name: Wait for image to be available in registry
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          SOURCE_DIGEST: ${{ github.event_name == 'workflow_run' && '' || inputs.source_digest }}
        run: |
          for attempt in $(seq 1 10); do
            if docker buildx imagetools inspect "${IMAGE}@${SOURCE_DIGEST}" >/dev/null 2>&1; then
              echo "Image available (attempt ${attempt}/10)"
              exit 0
            fi
            echo "Image not yet available (attempt ${attempt}/10); retrying in 30s..."
            sleep 30
          done
          echo "::error::Image ${IMAGE}@${SOURCE_DIGEST} was not available after 5 minutes"
          exit 1

      - name: Validate immutable image identity and resolve previous digest
        id: image
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          TAG: ${{ steps.meta.outputs.tag }}
          SOURCE_DIGEST: ${{ github.event_name == 'workflow_run' && '' || inputs.source_digest }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          exec 3>>"${GITHUB_OUTPUT}"
          CURRENT_DIGEST="${SOURCE_DIGEST}"
          [[ "${CURRENT_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "${SOURCE_SHA}" =~ ^[0-9a-f]{40}$ ]]
          LABELS_JSON="$(docker buildx imagetools inspect "${IMAGE}@${CURRENT_DIGEST}" --format '{{ json .Image.Config.Labels }}')"
          CURRENT_VERSION="$(jq -r '."org.opencontainers.image.version"' <<< "${LABELS_JSON}")"
          ACTUAL_REVISION="$(jq -r '."org.opencontainers.image.revision"' <<< "${LABELS_JSON}")"
          BASE_NAME="$(jq -r '."org.opencontainers.image.base.name"' <<< "${LABELS_JSON}")"
          BASE_DIGEST="$(jq -r '."org.opencontainers.image.base.digest"' <<< "${LABELS_JSON}")"
          UPSTREAM_BASE="$(jq -r '."org.kyth.build.upstream-base"' <<< "${LABELS_JSON}")"
          GE_PROTON_VERSION="$(jq -r '."org.kyth.build.ge-proton-version"' <<< "${LABELS_JSON}")"
          THIRDPARTY_HASH="$(jq -r '."org.kyth.build.thirdparty-versions-hash"' <<< "${LABELS_JSON}")"
          KERNEL_FLAVOR="$(jq -r '."org.kyth.build.kernel-flavor"' <<< "${LABELS_JSON}")"
          test "${ACTUAL_REVISION}" = "${SOURCE_SHA}"
          test "${SOURCE_SHA}" = "$(git rev-parse HEAD)"
          [[ "${CURRENT_VERSION}" =~ ^${TAG}\.[0-9]{8}\.[0-9]+\.[0-9]+\.[0-9a-f]{8}$ ]]
          test "${BASE_NAME}" = "${IMAGE}:base-${TAG}"
          [[ "${BASE_NAME}" =~ ^ghcr\.io/[a-z0-9._/-]+:[a-z0-9._-]+$ ]]
          [[ "${BASE_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "${UPSTREAM_BASE}" =~ ^ghcr\.io/ublue-os/kinoite-main:44@sha256:[0-9a-f]{64}$ ]]
          test -n "${GE_PROTON_VERSION}"
          [[ "${THIRDPARTY_HASH}" =~ ^[0-9a-f]{16}$ ]]
          test "${KERNEL_FLAVOR}" = fedora

          PREVIOUS_TAG="$(oras repo tags "${IMAGE}" \
            | grep -E "^${TAG}\.[0-9]{8}\.[0-9]+\.[0-9]+\.[0-9a-f]{8}$" \
            | grep -vx "${CURRENT_VERSION}" \
            | sort -V \
            | tail -n1 || true)"
          PREVIOUS_DIGEST=""
          if [[ -n "${PREVIOUS_TAG}" ]]; then
            PREVIOUS_DIGEST="$(docker buildx imagetools inspect "${IMAGE}:${PREVIOUS_TAG}" --format '{{ .Manifest.Digest }}' 2>/dev/null || true)"
          fi

          echo "current_digest=${CURRENT_DIGEST}" >&3
          echo "current_version=${CURRENT_VERSION}" >&3
          echo "previous_digest=${PREVIOUS_DIGEST}" >&3
          echo "source_sha=${SOURCE_SHA}" >&3
          echo "base_name=${BASE_NAME}" >&3
          echo "base_digest=${BASE_DIGEST}" >&3
          echo "upstream_base=${UPSTREAM_BASE}" >&3
          echo "ge_proton_version=${GE_PROTON_VERSION}" >&3
          echo "thirdparty_hash=${THIRDPARTY_HASH}" >&3
          echo "kernel_flavor=${KERNEL_FLAVOR}" >&3

      - name: Setup Syft
        id: setup_syft
        env:
          SYFT_VERSION: 1.39.0
          SYFT_SHA256: bb8f1ba8201d1ce0d99ab4f5243142629c1afba4da97a7c4ca2df97327f97190
        run: |
          exec 3>>"${GITHUB_OUTPUT}"
          ARCHIVE="syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          URL="https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/${ARCHIVE}"
          curl --fail --location --silent --show-error --output "${RUNNER_TEMP}/${ARCHIVE}" "${URL}"
          echo "${SYFT_SHA256}  ${RUNNER_TEMP}/${ARCHIVE}" | sha256sum --check
          tar --extract --gzip --file "${RUNNER_TEMP}/${ARCHIVE}" --directory "${RUNNER_TEMP}" syft
          chmod +x "${RUNNER_TEMP}/syft"
          echo "cmd=${RUNNER_TEMP}/syft" >&3

      - name: Prepare image RPM database
        id: image_rootfs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ steps.meta.outputs.image }}
          DIGEST: ${{ steps.image.outputs.current_digest }}
        run: |
          exec 3>>"${GITHUB_OUTPUT}"
          printf '%s' "${GH_TOKEN}" | sudo podman login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin
          sudo podman pull "${IMAGE}@${DIGEST}"
          CONTAINER="$(sudo podman create "${IMAGE}@${DIGEST}" /usr/bin/true)"
          trap 'sudo podman rm --force "${CONTAINER}" >/dev/null' EXIT
          ROOTFS="$(sudo podman mount "${CONTAINER}")"
          sudo test -f "${ROOTFS}/usr/share/rpm/rpmdb.sqlite"
          SCAN_ROOT="${RUNNER_TEMP}/syft-root"
          mkdir -p "${SCAN_ROOT}/usr/share" "${SCAN_ROOT}/usr/lib"
          sudo cp -a "${ROOTFS}/usr/share/rpm" "${SCAN_ROOT}/usr/share/rpm"
          sudo cp "${ROOTFS}/usr/lib/os-release" "${SCAN_ROOT}/usr/lib/os-release"
          sudo chown -R "${USER}:${USER}" "${SCAN_ROOT}"
          echo "rootfs=${SCAN_ROOT}" >&3

      - name: Generate image SBOM
        id: sbom
        timeout-minutes: 30
        env:
          SYFT_CMD: ${{ steps.setup_syft.outputs.cmd }}
          IMAGE: ${{ steps.meta.outputs.image }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.image.outputs.current_version }}
          DIGEST: ${{ steps.image.outputs.current_digest }}
          ROOTFS: ${{ steps.image_rootfs.outputs.rootfs }}
          SYFT_CHECK_FOR_APP_UPDATE: "false"
          XDG_CACHE_HOME: ${{ runner.temp }}/syft-cache
        run: |
          exec 3>>"${GITHUB_OUTPUT}"
          SBOM="kyth-${TAG}-${VERSION}.syft.json"
          sudo "${SYFT_CMD}" "dir:${ROOTFS}" \
            --override-default-catalogers rpm-db-cataloger \
            --parallelism 1 \
            --source-name "${IMAGE}@${DIGEST}" \
            -o "syft-json=${SBOM}"
          sudo chown "${USER}:${USER}" "${SBOM}"
          jq -e '.artifacts | length > 0' "${SBOM}" >/dev/null
          echo "path=${SBOM}" >&3

      - name: Capture RPM manifest
        id: rpm_manifest
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.image.outputs.current_version }}
          SBOM_PATH: ${{ steps.sbom.outputs.path }}
        run: |
          exec 3>>"${GITHUB_OUTPUT}"
          OUT_FILE="rpm-manifest-${TAG}-${VERSION}.txt"
          python3 - "${SBOM_PATH}" "${OUT_FILE}" <<'PY'
          import json, sys
          from pathlib import Path
          sbom = json.loads(Path(sys.argv[1]).read_text())
          pkgs = []
          for a in sbom.get("artifacts", []):
              if a.get("type") != "rpm":
                  continue
              m = a.get("metadata") or {}
              name = a["name"]
              arch = m.get("architecture", "")
              meta_ver = m.get("version", "")
              meta_rel = m.get("release", "")
              if meta_ver and meta_rel:
                  pkgs.append(f"{name}-{meta_ver}-{meta_rel}.{arch}")
              else:
                  ver = a.get("version", "")
                  pkgs.append(f"{name}-{ver}.{arch}" if arch else f"{name}-{ver}")
          pkgs.sort()
          Path(sys.argv[2]).write_text("\n".join(pkgs) + "\n")
          PY
          echo "path=${OUT_FILE}" >&3

      - name: Setup Grype
        id: setup_grype
        env:
          GRYPE_VERSION: 0.88.0
        run: |
          ARCHIVE="grype_${GRYPE_VERSION}_linux_amd64.tar.gz"
          BASE="https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}"
          curl --fail --location --silent --show-error \
            --output "${RUNNER_TEMP}/${ARCHIVE}" "${BASE}/${ARCHIVE}"
          curl --fail --location --silent --show-error \
            --output "${RUNNER_TEMP}/grype_checksums.txt" \
            "${BASE}/grype_${GRYPE_VERSION}_checksums.txt"
          (cd "${RUNNER_TEMP}" && grep " ${ARCHIVE}$" grype_checksums.txt | sha256sum --check --strict -)
          tar --extract --gzip --file "${RUNNER_TEMP}/${ARCHIVE}" --directory "${RUNNER_TEMP}" grype
          chmod +x "${RUNNER_TEMP}/grype"
          echo "cmd=${RUNNER_TEMP}/grype" >> "$GITHUB_OUTPUT"

      - name: Scan current SBOM with Grype
        id: grype_current
        env:
          GRYPE_CMD: ${{ steps.setup_grype.outputs.cmd }}
          SBOM_PATH: ${{ steps.sbom.outputs.path }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.image.outputs.current_version }}
        run: |
          OUT="grype-current-${TAG}-${VERSION}.json"
          "${GRYPE_CMD}" "sbom:${SBOM_PATH}" -o json --file "${OUT}" || \
            echo "::warning::Grype scan failed; security section will be skipped"
          [[ -f "${OUT}" ]] && echo "path=${OUT}" >> "$GITHUB_OUTPUT"

      - name: Pull previous image SBOM
        id: previous_sbom
        if: steps.image.outputs.previous_digest != ''
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          PREVIOUS_DIGEST: ${{ steps.image.outputs.previous_digest }}
        run: |
          PREV_SBOM_DIGEST="$(oras discover --format json "${IMAGE}@${PREVIOUS_DIGEST}" \
            | jq -r '[.referrers[] | select(.artifactType | contains("syft"))] | .[0].digest // empty' \
            2>/dev/null || true)"
          if [[ -z "${PREV_SBOM_DIGEST}" ]]; then
            echo "No previous SBOM found; CVE diff will be skipped"
            exit 0
          fi
          mkdir -p "${RUNNER_TEMP}/prev-sbom"
          oras pull "${IMAGE}@${PREV_SBOM_DIGEST}" -o "${RUNNER_TEMP}/prev-sbom/"
          PREV_SBOM="$(find "${RUNNER_TEMP}/prev-sbom" -name '*.json' -type f | head -1)"
          [[ -n "${PREV_SBOM}" ]] && echo "path=${PREV_SBOM}" >> "$GITHUB_OUTPUT"

      - name: Scan previous SBOM with Grype
        id: grype_previous
        if: steps.previous_sbom.outputs.path != ''
        env:
          GRYPE_CMD: ${{ steps.setup_grype.outputs.cmd }}
          PREV_SBOM: ${{ steps.previous_sbom.outputs.path }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          OUT="grype-previous-${TAG}.json"
          "${GRYPE_CMD}" "sbom:${PREV_SBOM}" -o json --file "${OUT}" || \
            echo "::warning::Grype scan of previous SBOM failed; CVE diff will be incomplete"
          [[ -f "${OUT}" ]] && echo "path=${OUT}" >> "$GITHUB_OUTPUT"


      - name: Generate SBOM-powered changelog
        id: changelog
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          CURRENT_TAG: ${{ steps.image.outputs.current_version }}
          CURRENT_DIGEST: ${{ steps.image.outputs.current_digest }}
          PREVIOUS_DIGEST: ${{ steps.image.outputs.previous_digest }}
          CURRENT_SHA: ${{ steps.image.outputs.source_sha }}
          CURRENT_SBOM: ${{ steps.sbom.outputs.path }}
          SOURCE_TAG: ${{ inputs.source_tag }}
          GRYPE_CURRENT: ${{ steps.grype_current.outputs.path }}
          GRYPE_PREVIOUS: ${{ steps.grype_previous.outputs.path }}
        run: |
          exec 3>>"${GITHUB_OUTPUT}"
          NOTES="image-changelog-${CURRENT_TAG}.md"
          BRANCH=main
          if [[ "${SOURCE_TAG}" == "testing" ]]; then
            BRANCH=testing
          fi
          GRYPE_ARGS=()
          [[ -n "${GRYPE_CURRENT}" ]] && GRYPE_ARGS+=(--grype-current "${GRYPE_CURRENT}")
          [[ -n "${GRYPE_PREVIOUS}" ]] && GRYPE_ARGS+=(--grype-previous "${GRYPE_PREVIOUS}")
          python3 .github/scripts/kyth_changelog.py \
            --image "${IMAGE}" \
            --branch "${BRANCH}" \
            --current-tag "${CURRENT_TAG}" \
            --current-digest "${CURRENT_DIGEST}" \
            --previous-digest "${PREVIOUS_DIGEST}" \
            --current-sha "${CURRENT_SHA}" \
            --current-sbom-file "${CURRENT_SBOM}" \
            "${GRYPE_ARGS[@]}" \
            --output "${NOTES}"
          echo "path=${NOTES}" >&3

      - name: Package publish inputs
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          TAG: ${{ steps.meta.outputs.tag }}
          SOURCE_SHA: ${{ steps.image.outputs.source_sha }}
          SOURCE_GITHUB_SHA: ${{ inputs.source_github_sha }}
          CURRENT_DIGEST: ${{ steps.image.outputs.current_digest }}
          CURRENT_VERSION: ${{ steps.image.outputs.current_version }}
          PREVIOUS_DIGEST: ${{ steps.image.outputs.previous_digest }}
          BASE_NAME: ${{ steps.image.outputs.base_name }}
          BASE_DIGEST: ${{ steps.image.outputs.base_digest }}
          UPSTREAM_BASE: ${{ steps.image.outputs.upstream_base }}
          GE_PROTON_VERSION: ${{ steps.image.outputs.ge_proton_version }}
          THIRDPARTY_HASH: ${{ steps.image.outputs.thirdparty_hash }}
          KERNEL_FLAVOR: ${{ steps.image.outputs.kernel_flavor }}
          RPM_MANIFEST: ${{ steps.rpm_manifest.outputs.path }}
          SBOM: ${{ steps.sbom.outputs.path }}
          NOTES: ${{ steps.changelog.outputs.path }}
        run: |
          mkdir -p output/supply-chain
          cp "${RPM_MANIFEST}" "${SBOM}" "${NOTES}" output/supply-chain/
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          source_sha = os.environ["SOURCE_SHA"]
          metadata = {
              "image": os.environ["IMAGE"],
              "tag": os.environ["TAG"],
              "source_sha": source_sha,
              # github_sha is the GITHUB_SHA from the triggering build workflow run.
              # For schedule runs building a non-default branch, it equals the default
              # branch HEAD rather than the checked-out branch commit (source_sha).
              "github_sha": os.environ.get("SOURCE_GITHUB_SHA") or source_sha,
              "current_digest": os.environ["CURRENT_DIGEST"],
              "current_version": os.environ["CURRENT_VERSION"],
              "previous_digest": os.environ["PREVIOUS_DIGEST"],
              "materials": {
                  "build_base": os.environ["BASE_NAME"] + "@" + os.environ["BASE_DIGEST"],
                  "upstream_base": os.environ["UPSTREAM_BASE"],
                  "ge_proton_version": os.environ["GE_PROTON_VERSION"],
                  "thirdparty_versions_hash": os.environ["THIRDPARTY_HASH"],
                  "kernel_flavor": os.environ["KERNEL_FLAVOR"],
              },
              "rpm_manifest": Path(os.environ["RPM_MANIFEST"]).name,
              "sbom": Path(os.environ["SBOM"]).name,
              "notes": Path(os.environ["NOTES"]).name,
          }
          Path("output/supply-chain/metadata.json").write_text(
              json.dumps(metadata, indent=2) + "\n"
          )
          PY

      - name: Upload prepared metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: supply-chain-input-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || inputs.source_tag }}-${{ github.run_id }}
          path: output/supply-chain/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish metadata (${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || inputs.source_tag }})
    needs: prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: ${{ inputs.source_tag == 'testing' && 'testing-release' || 'stable-release' }}
    permissions:
      actions: write
      contents: write
      packages: write
      id-token: write
    concurrency:
      group: supply-chain-publish-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || inputs.source_tag }}
      cancel-in-progress: false

    steps:
      - name: Download prepared metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: supply-chain-input-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || inputs.source_tag }}-${{ github.run_id }}
          path: output/supply-chain

      - name: Validate publish inputs
        id: meta
        run: |
          exec 3>>"${GITHUB_OUTPUT}"
          METADATA=output/supply-chain/metadata.json
          jq -e . "${METADATA}" >/dev/null
          IMAGE="$(jq -r .image "${METADATA}")"
          TAG="$(jq -r .tag "${METADATA}")"
          SOURCE_SHA="$(jq -r .source_sha "${METADATA}")"
          GITHUB_SHA_META="$(jq -r '.github_sha // .source_sha' "${METADATA}")"
          DIGEST="$(jq -r .current_digest "${METADATA}")"
          VERSION="$(jq -r .current_version "${METADATA}")"
          BUILD_BASE="$(jq -r .materials.build_base "${METADATA}")"
          UPSTREAM_BASE="$(jq -r .materials.upstream_base "${METADATA}")"
          GE_PROTON_VERSION="$(jq -r .materials.ge_proton_version "${METADATA}")"
          THIRDPARTY_HASH="$(jq -r .materials.thirdparty_versions_hash "${METADATA}")"
          KERNEL_FLAVOR="$(jq -r .materials.kernel_flavor "${METADATA}")"
          SBOM="$(jq -r .sbom "${METADATA}")"
          NOTES="$(jq -r .notes "${METADATA}")"

          [[ "${IMAGE}" =~ ^ghcr\.io/[a-z0-9._/-]+$ ]]
          [[ "${TAG}" == "latest" || "${TAG}" == "testing" ]]
          [[ "${TAG}" == "${MATRIX_SOURCE_TAG}" ]]
          [[ "${SOURCE_SHA}" =~ ^[0-9a-f]{40}$ ]]
          [[ "${GITHUB_SHA_META}" =~ ^[0-9a-f]{40}$ ]]
          [[ "${DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "${VERSION}" =~ ^[a-z0-9._-]+$ ]]
          [[ "${BUILD_BASE}" =~ ^ghcr\.io/[a-z0-9._/-]+:[a-z0-9._-]+@sha256:[0-9a-f]{64}$ ]]
          [[ "${UPSTREAM_BASE}" =~ ^ghcr\.io/ublue-os/kinoite-main:44@sha256:[0-9a-f]{64}$ ]]
          test -n "${GE_PROTON_VERSION}"
          [[ "${THIRDPARTY_HASH}" =~ ^[0-9a-f]{16}$ ]]
          test "${KERNEL_FLAVOR}" = fedora
          [[ "${SBOM}" == "$(basename "${SBOM}")" && -s "output/supply-chain/${SBOM}" ]]
          [[ "${NOTES}" == "$(basename "${NOTES}")" && -s "output/supply-chain/${NOTES}" ]]

          echo "image=${IMAGE}" >&3
          echo "tag=${TAG}" >&3
          echo "source_sha=${SOURCE_SHA}" >&3
          echo "github_sha=${GITHUB_SHA_META}" >&3
          echo "digest=${DIGEST}" >&3
          echo "version=${VERSION}" >&3
          echo "sbom=${SBOM}" >&3
          echo "notes=${NOTES}" >&3
        env:
          MATRIX_SOURCE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || inputs.source_tag }}

      - name: Install ORAS
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0
        with:
          version: 1.3.1

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.6.1

      - name: Log in to GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${GH_TOKEN}" | oras login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Sign container image
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          DIGEST: ${{ steps.meta.outputs.digest }}
        run: |
          cosign sign -y "${IMAGE}@${DIGEST}"

      - name: Attach and sign SBOM
        id: attach_sbom
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          DIGEST: ${{ steps.meta.outputs.digest }}
          VERSION: ${{ steps.meta.outputs.version }}
          SBOM: output/supply-chain/${{ steps.meta.outputs.sbom }}
        run: |
          exec 3>>"${GITHUB_OUTPUT}"
          ATTACH_OUTPUT="$(oras attach --format json \
            --artifact-type application/vnd.syft+json \
            --annotation "org.opencontainers.image.title=$(basename "${SBOM}")" \
            --annotation "org.opencontainers.image.description=Syft SBOM for Kyth image ${VERSION}" \
            --annotation "org.opencontainers.image.version=${VERSION}" \
            "${IMAGE}@${DIGEST}" \
            "${SBOM}")"
          SBOM_DIGEST="$(jq -r '.digest' <<< "${ATTACH_OUTPUT}")"
          [[ "${SBOM_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]
          echo "digest=${SBOM_DIGEST}" >&3
          cosign sign -y "${IMAGE}@${SBOM_DIGEST}"

      - name: Verify published signatures and build provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ steps.meta.outputs.image }}
          DIGEST: ${{ steps.meta.outputs.digest }}
          SBOM_DIGEST: ${{ steps.attach_sbom.outputs.digest }}
          SOURCE_SHA: ${{ steps.meta.outputs.source_sha }}
          GITHUB_SHA_META: ${{ steps.meta.outputs.github_sha }}
        run: |
          IDENTITY="^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/supply-chain\\.yml@refs/heads/(main|testing)$"
          ISSUER="https://token.actions.githubusercontent.com"

          cosign verify \
            --certificate-identity-regexp "${IDENTITY}" \
            --certificate-oidc-issuer "${ISSUER}" \
            "${IMAGE}@${DIGEST}"
          cosign verify \
            --certificate-identity-regexp "${IDENTITY}" \
            --certificate-oidc-issuer "${ISSUER}" \
            "${IMAGE}@${SBOM_DIGEST}"

          for attempt in 1 2 3 4 5; do
            if gh attestation verify "oci://${IMAGE}@${DIGEST}" \
              --repo "${GITHUB_REPOSITORY}" \
              --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/build.yml" \
              --source-digest "${GITHUB_SHA_META}" \
              --deny-self-hosted-runners; then
              exit 0
            fi
            echo "Provenance not visible yet (attempt ${attempt}/5); retrying..."
            sleep 10
          done
          echo "::error::Build provenance could not be verified for ${IMAGE}@${DIGEST}"
          exit 1

      - name: Publish image changelog release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ steps.meta.outputs.version }}
          SOURCE_SHA: ${{ steps.meta.outputs.source_sha }}
          NOTES: output/supply-chain/${{ steps.meta.outputs.notes }}
          SOURCE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || inputs.source_tag }}
        run: |
          RELEASE_TAG="image-${VERSION//./-}"
          TITLE="Kyth Image - ${VERSION}"
          PRERELEASE=""
          if [[ "${SOURCE_TAG}" != "latest" ]]; then
            PRERELEASE="--prerelease"
          fi

          if gh release view "${RELEASE_TAG}" &>/dev/null; then
            gh release edit "${RELEASE_TAG}" --title "${TITLE}" --notes-file "${NOTES}" ${PRERELEASE}
          else
            gh release create "${RELEASE_TAG}" \
              --target "${SOURCE_SHA}" \
              --title "${TITLE}" \
              --notes-file "${NOTES}" \
              ${PRERELEASE}
          fi

      - name: Trigger CVE scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          SOURCE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || inputs.source_tag }}
        run: |
          gh workflow run cve-scan.yml \
            --ref "${GITHUB_REF_NAME}" \
            --field "source_tag=${SOURCE_TAG}"
