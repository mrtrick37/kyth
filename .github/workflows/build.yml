name: Build container image
on:
  schedule:
    - cron: '05 10 * * *'  # 10:05am UTC daily — rebuilds both :latest and :testing with fresh upstream packages
  push:
    branches:
      - main
      - testing
    paths-ignore:
      - '**/README.md'
  workflow_dispatch:

env:
  IMAGE_DESC: "Kyth — atomic gaming and dev workstation built on Fedora Kinoite"
  IMAGE_KEYWORDS: "bootc,ublue,universal-blue"
  IMAGE_LOGO_URL: "https://avatars.githubusercontent.com/u/120078124?s=200&v=4"  # Put your own image here for a fancy profile on https://artifacthub.io/!
  IMAGE_NAME: "${{ github.event.repository.name }}"  # output image name, usually same as repo name
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"  # do not edit
jobs:
  build_push:
    name: Build and push (${{ matrix.branch }}, ${{ matrix.kernel_flavor }})
    runs-on: ubuntu-24.04
    # fail-fast is false below, so a cachy failure never blocks the fedora leg
    # or the live ISO dispatch. Let it mark the run red — continue-on-error here
    # would hide scheduled cachy build breakage indefinitely.
    env:
      DOCKER_CONFIG: /tmp/kyth-docker-config

    # One slot per branch — prevents a scheduled run and a push from racing on the same tag.
    concurrency:
      group: ${{ github.workflow }}-${{ matrix.branch }}-${{ matrix.kernel_flavor }}
      cancel-in-progress: ${{ github.event_name == 'push' }}

    strategy:
      fail-fast: false
      matrix:
        # schedule → build both branches in parallel
        # push / workflow_dispatch → build only the triggered branch
        branch: ${{ github.event_name == 'schedule' && fromJSON('["main","testing"]') || fromJSON(format('["{0}"]', github.ref_name)) }}
        kernel_flavor: [fedora, cachy]

    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - name: Prepare environment
        id: prep
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}
          # main → :latest, everything else → :<branch-name>
          TAG="${{ matrix.branch == 'main' && 'latest' || matrix.branch }}"
          case "${{ matrix.kernel_flavor }}" in
            fedora) SUFFIX="" ;;
            cachy)  SUFFIX="-cachy" ;;
          esac
          echo "DEFAULT_TAG=${TAG}" >> ${GITHUB_ENV}
          echo "KERNEL_TAG_SUFFIX=${SUFFIX}" >> ${GITHUB_ENV}
          echo "default_tag=${TAG}${SUFFIX}" >> ${GITHUB_OUTPUT}

      # These stage versions are pinned by https://github.com/renovatebot/renovate
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ matrix.branch }}

      - name: Capture checked-out commit
        id: checkout_sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Maximize build space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: true

      - name: Prepare Docker auth config
        run: |
          mkdir -p "${DOCKER_CONFIG}"
          printf '{"auths":{}}\n' > "${DOCKER_CONFIG}/config.json"

      - name: Get current date
        id: date
        run: |
          # This generates a timestamp like what is defined on the ArtifactHub documentation
          # E.G: 2022-02-08T15:38:15Z'
          # https://artifacthub.io/docs/topics/repositories/container-images/
          # https://linux.die.net/man/1/date
          echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      # Image metadata for https://artifacthub.io/ - This is optional but is highly recommended so we all can get a index of all the custom images
      # The metadata by itself is not going to do anything, you choose if you want your image to be on ArtifactHub or not.
      - name: Image Metadata
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: metadata
        with:
          # This generates all the tags for your image, you can add custom tags here too!
          # Default tags are "$DEFAULT_TAG" and "$DEFAULT_TAG.$date".
          tags: |
            type=raw,value=${{ steps.prep.outputs.default_tag }}
            type=raw,value=${{ steps.prep.outputs.default_tag }}.{{date 'YYYYMMDD'}}
            type=raw,value={{date 'YYYYMMDD'}},enable=${{ matrix.branch == 'main' && matrix.kernel_flavor == 'fedora' }}
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ steps.checkout_sha.outputs.sha }}/README.md
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ steps.checkout_sha.outputs.sha }}/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/blob/${{ steps.checkout_sha.outputs.sha }}/Dockerfile
            org.opencontainers.image.revision=${{ steps.checkout_sha.outputs.sha }}
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/tree/${{ steps.checkout_sha.outputs.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ steps.prep.outputs.default_tag }}.{{date 'YYYYMMDD'}}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=${{ env.IMAGE_KEYWORDS }}
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.logo-url=${{ env.IMAGE_LOGO_URL }}
            io.artifacthub.package.prerelease=${{ matrix.branch != 'main' }}
            containers.bootc=1
          sep-tags: " "
          sep-labels: "\n"
          sep-annotations: "\n"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Version resolution lives in build_files/scripts/resolve-versions.sh,
      # shared with the Justfile so the parsing logic exists in one place.
      - name: Resolve latest CachyOS kernel version
        id: cachyos_kernel
        if: matrix.kernel_flavor == 'cachy'
        run: |
          KVER=$(./build_files/scripts/resolve-versions.sh cachyos-kernel)
          echo "version=${KVER}" >> $GITHUB_OUTPUT
          echo "Resolved CachyOS kernel: ${KVER}"

      - name: Resolve latest GE-Proton version
        id: ge_proton
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GE_VER=$(./build_files/scripts/resolve-versions.sh ge-proton)
          echo "version=${GE_VER}" >> $GITHUB_OUTPUT
          echo "Resolved GE-Proton: ${GE_VER:-latest}"

      - name: Resolve thirdparty tool versions
        id: thirdparty_versions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HASH=$(./build_files/scripts/resolve-versions.sh thirdparty-hash)
          echo "hash=${HASH}" >> $GITHUB_OUTPUT
          echo "Resolved thirdparty hash: ${HASH}"

      - name: Build base image
        run: |
          IMAGE_FULL="ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}"
          BASE_CACHE_REF="${IMAGE_FULL}:buildcache-base-${{ matrix.branch }}-${{ matrix.kernel_flavor }}"
          BASE_IMAGE_REF="${IMAGE_FULL}:base-${{ steps.prep.outputs.default_tag }}"

          docker buildx build \
            --build-arg BASE_IMAGE=ghcr.io/ublue-os/kinoite-main:44 \
            --build-arg KYTH_KERNEL_FLAVOR="${{ matrix.kernel_flavor }}" \
            --build-arg CACHYOS_KERNEL_VER="${{ steps.cachyos_kernel.outputs.version || 'unused' }}" \
            --cache-from "type=registry,ref=${BASE_CACHE_REF}" \
            --cache-to "type=registry,ref=${BASE_CACHE_REF},mode=max" \
            --tag "${BASE_IMAGE_REF}" \
            --push \
            build_base/

      - name: Build final image
        run: |
          IMAGE_FULL="ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}"
          FINAL_CACHE_REF="${IMAGE_FULL}:buildcache-final-${{ matrix.branch }}-${{ matrix.kernel_flavor }}"
          BASE_IMAGE_REF="${IMAGE_FULL}:base-${{ steps.prep.outputs.default_tag }}"

          TAG_ARGS=()
          for tag in ${{ steps.metadata.outputs.tags }}; do
            TAG_ARGS+=(--tag "${IMAGE_FULL}:${tag}")
          done

          # MOK_KEY is optional — builds without it, or with a stale key, skip
          # vmlinuz signing gracefully for the regular container image.
          # To enable Secure Boot: add MOK_KEY as a repository secret containing
          # the PEM-encoded RSA private key matching build_files/secureboot/kyth-secureboot.cer.
          MOK_SECRET_ARG=()
          SECUREBOOT_SIGNING_REQUESTED=0
          if [[ -n "${MOK_KEY:-}" ]]; then
            MOK_SECRET_ARG=(--secret id=mok_key,env=MOK_KEY)
            # Strict mode: with a key configured, a mismatched/unreadable key
            # must fail the build instead of silently shipping unsigned vmlinuz.
            SECUREBOOT_SIGNING_REQUESTED=1
          fi

          docker buildx build \
            --secret id=github_token,env=GITHUB_TOKEN \
            "${MOK_SECRET_ARG[@]}" \
            --build-arg BASE_IMAGE="${BASE_IMAGE_REF}" \
            --build-arg GE_PROTON_VER="${{ steps.ge_proton.outputs.version }}" \
            --build-arg THIRDPARTY_VERSIONS_HASH="${{ steps.thirdparty_versions.outputs.hash }}" \
            --build-arg BUILD_DATE="$(date +%Y-%m-%d)" \
            --build-arg SECUREBOOT_SIGNING_REQUESTED="${SECUREBOOT_SIGNING_REQUESTED}" \
            --cache-from "type=registry,ref=${FINAL_CACHE_REF}" \
            --cache-to "type=registry,ref=${FINAL_CACHE_REF},mode=max" \
            "${TAG_ARGS[@]}" \
            --output "type=image,push=true,compression=zstd,force-compression=true,oci-mediatypes=true" \
            .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MOK_KEY: ${{ secrets.MOK_KEY }}

      - name: Trigger live ISO build
        # Only the fedora-kernel image is used for the live ISO.
        # Dispatch directly so the ISO workflow runs from the correct branch,
        # not from main (which is what workflow_run would use).
        if: matrix.kernel_flavor == 'fedora'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SOURCE_TAG="${DEFAULT_TAG}"
          echo "==> Dispatching live ISO build for ${SOURCE_TAG} on ${{ matrix.branch }}"
          gh workflow run build-live-iso.yml \
            --ref "${{ matrix.branch }}" \
            --field "source_tag=${SOURCE_TAG}"
