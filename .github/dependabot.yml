version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Chicago
    target-branch: testing
    groups:
      actions:
        patterns: ["*"]
    labels: ["ci", "dependencies"]

  - package-ecosystem: docker
    directory: /build_base
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Chicago
    target-branch: testing
    labels: ["build", "dependencies"]
