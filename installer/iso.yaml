label: "KYTHOS-44-LIVE"
grub2:
  timeout: 10
  entries:
    - name: "Try KythOS Live"
      linux: "/images/pxeboot/vmlinuz quiet rhgb splash root=live:CDLABEL=KYTHOS-44-LIVE rd.live.image rd.live.overlay.overlayfs=1 kyth.live=1 enforcing=0"
      initrd: "/images/pxeboot/initrd.img"
    - name: "Try KythOS Live (Basic Graphics)"
      linux: "/images/pxeboot/vmlinuz quiet rhgb root=live:CDLABEL=KYTHOS-44-LIVE rd.live.image rd.live.overlay.overlayfs=1 kyth.live=1 enforcing=0 nomodeset"
      initrd: "/images/pxeboot/initrd.img"
